<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelWorld — 4096×2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#070d1a;font-family:'Courier New',monospace}
#app{display:flex;flex-direction:column;width:100vw;height:100vh}
#main{display:flex;flex-direction:row;flex:1;overflow:hidden;min-height:0}
#toolbar{display:flex;align-items:center;gap:8px;padding:7px 14px;flex-shrink:0;background:#0c1526;border-bottom:1px solid rgba(255,255,255,0.07);flex-wrap:wrap;z-index:20;min-height:46px;}
#toolbar h1{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#e2e8f0;white-space:nowrap}
#toolbar h1 span{color:#3b82f6}
.sep{width:1px;height:20px;background:rgba(255,255,255,0.08);flex-shrink:0}
select,.btn{background:#162035;border:1px solid rgba(255,255,255,0.1);color:#cbd5e1;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;transition:border-color .15s,background .15s;}
select:hover,.btn:hover{border-color:rgba(255,255,255,.22);background:#1e2e4a}
select:focus,.btn:focus{outline:none;border-color:#3b82f6}
#brush-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:#475569}
#brush-wrap input{width:70px;accent-color:#3b82f6}
#stats{font-size:11px;color:#334155;margin-left:auto;white-space:nowrap}
#stats b{color:#64748b}
#swatch{width:12px;height:12px;border-radius:2px;border:1px solid rgba(255,255,255,.12);flex-shrink:0}
#viewport{flex:1;position:relative;overflow:hidden;cursor:crosshair}
canvas{position:absolute;top:0;left:0;transform-origin:0 0;image-rendering:pixelated;image-rendering:crisp-edges}
#c-border{pointer-events:none}
#loading{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#070d1a;gap:16px;}
#loading h2{font-size:14px;font-weight:700;color:#e2e8f0;letter-spacing:.12em;text-transform:uppercase}
#load-msg{font-size:11px;color:#64748b;min-height:1.4em;text-align:center;max-width:360px;line-height:1.5}
#prog-bar{width:260px;height:2px;background:#162035;border-radius:1px;overflow:hidden}
#prog-fill{height:100%;background:#3b82f6;width:0%;transition:width .4s}
#err-box{display:none;color:#f87171;font-size:11px;text-align:center;max-width:360px;line-height:1.7;padding:12px 16px;border:1px solid rgba(248,113,113,0.3);border-radius:6px;white-space:pre-line}
#retry-btn{display:none;background:#162035;border:1px solid rgba(255,255,255,0.15);color:#93c5fd;padding:6px 16px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
#retry-btn:hover{background:#1e2e4a}
.hud{position:absolute;background:rgba(7,13,26,.9);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 12px;}
#legend{bottom:12px;left:12px;max-width:200px;max-height:260px;overflow-y:auto}
#legend::-webkit-scrollbar{width:3px}
#legend::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
#legend h3{font-size:9px;color:#334155;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px;color:#64748b;white-space:nowrap}
.leg-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
#zoom-hud{bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;padding:6px}
.z-btn{width:27px;height:27px;border-radius:5px;background:#162035;border:1px solid rgba(255,255,255,.08);color:#64748b;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1;font-family:inherit;}
.z-btn:hover{background:#1e2e4a;color:#e2e8f0}
#tip{position:absolute;display:none;z-index:30;pointer-events:none;background:rgba(7,13,26,.97);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:8px 12px;font-size:11px;color:#cbd5e1;min-width:140px;max-width:220px;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,.4);}
#tip-name{font-weight:700;color:#fff;margin-bottom:5px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:5px}
#tip-sub{font-size:10px;color:#94a3b8;margin-top:0;line-height:1.8}

/* ── Pixel bucket HUD ── */
#bucket-hud{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  background:#0d1829;border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;font-size:11px;color:#94a3b8;white-space:nowrap;
}
#bucket-count{font-weight:700;font-size:13px;color:#e2e8f0;min-width:26px;text-align:right;}
#bucket-bar{width:42px;height:4px;background:#1e2e4a;border-radius:2px;overflow:hidden;}
#bucket-fill{height:100%;background:#3b82f6;width:0%;transition:width .4s linear;}
#bucket-timer{font-size:10px;color:#475569;min-width:28px;}

/* ── Bomb mode ── */
#btn-bomb{background:#1a1020;border:1px solid rgba(239,68,68,0.3);color:#f87171;}
#btn-bomb:hover{background:#2d1020;border-color:#ef4444;color:#fca5a5;}
#btn-bomb.active{background:#7f1d1d;border-color:#ef4444;color:#fef2f2;box-shadow:0 0 0 2px rgba(239,68,68,0.3);}
#bomb-radius-label{font-size:10px;color:#f87171;display:none;}
#btn-bomb.active + #bomb-radius-label{display:inline;}

/* ── Bomb flash overlay ── */
#bomb-flash{
  position:absolute;inset:0;pointer-events:none;z-index:90;
  background:rgba(239,68,68,0);transition:background .12s;
}
#bomb-flash.bang{background:rgba(239,68,68,0.18);}

/* ── Debug panel ── */
#debug-panel{
  width:190px;flex-shrink:0;background:#080f1c;
  border-left:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;overflow-y:auto;
  font-family:'Courier New',monospace;
}
#debug-panel::-webkit-scrollbar{width:3px}
#debug-panel::-webkit-scrollbar-thumb{background:#1e3a5f}
#dbg-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;background:#0c1526;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:11px;font-weight:700;color:#64748b;
  letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;
}
#dbg-close{
  background:none;border:none;color:#334155;cursor:pointer;
  font-size:12px;padding:0 2px;line-height:1;
}
#dbg-close:hover{color:#94a3b8;}
.dbg-section{
  padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;gap:4px;
}
.dbg-label{
  font-size:9px;color:#334155;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:2px;
}
.dbg-btn{
  background:#0f1e33;border:1px solid rgba(255,255,255,0.08);
  color:#94a3b8;padding:5px 8px;border-radius:4px;
  font-size:10px;cursor:pointer;text-align:left;
  font-family:'Courier New',monospace;
  transition:background .12s,border-color .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dbg-btn:hover{background:#162035;border-color:rgba(255,255,255,.18);color:#cbd5e1;}
.dbg-btn:active{transform:scale(0.97);}
.dbg-green{border-color:rgba(34,197,94,0.25);color:#86efac;}
.dbg-green:hover{background:#0f2016;border-color:rgba(34,197,94,.5);}
.dbg-red{border-color:rgba(239,68,68,0.25);color:#fca5a5;}
.dbg-red:hover{background:#1f0f0f;border-color:rgba(239,68,68,.5);}
.dbg-sound{border-color:rgba(99,102,241,0.25);color:#a5b4fc;}
.dbg-sound:hover{background:#0f1230;border-color:rgba(99,102,241,.5);}
.dbg-bomb{border-color:rgba(251,146,60,0.25);color:#fdba74;}
.dbg-bomb:hover{background:#1f1508;border-color:rgba(251,146,60,.5);}
.dbg-nuke{border-color:rgba(239,68,68,0.4);color:#fca5a5;background:#1a0808;}
.dbg-nuke:hover{background:#2d0f0f;border-color:rgba(239,68,68,.7);}
.dbg-stat{
  font-size:10px;color:#475569;
  display:flex;justify-content:space-between;
  padding:1px 0;
}
.dbg-stat span{color:#94a3b8;}


/* ── Bomb notification toast ── */
#bomb-toast{
  position:absolute;top:62px;right:14px;
  background:#1a0808;border:1px solid rgba(239,68,68,0.6);border-radius:8px;
  padding:10px 16px;font-size:12px;color:#fca5a5;
  display:none;z-index:59;max-width:260px;line-height:1.5;
  box-shadow:0 4px 20px rgba(239,68,68,.2);
  animation:toastIn .2s ease;
}
#bomb-toast .toast-title{font-weight:700;color:#fca5a5;font-size:11px;
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
#bomb-toast .toast-body{color:#fda4a4;}
/* ── Conquest toast (top-right) ── */
#conquest-toast{
  position:absolute;top:14px;right:14px;
  background:#0b1e3d;border:1px solid #2563eb;border-radius:8px;
  padding:10px 16px;font-size:12px;color:#93c5fd;
  display:none;z-index:60;max-width:260px;line-height:1.5;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  animation:toastIn .2s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
#conquest-toast .toast-title{font-weight:700;color:#e2e8f0;font-size:11px;
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
#conquest-toast .toast-body{color:#93c5fd;}
#banner{position:absolute;top:56px;left:50%;transform:translateX(-50%);background:#0b1e3d;border:1px solid #2563eb;border-radius:7px;padding:7px 20px;font-size:12px;color:#93c5fd;display:none;z-index:50;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h1>Pixel<span>World</span></h1>
    <div class="sep"></div>
    <div id="swatch"></div>
    <select id="csel"><option value="">Loading…</option></select>
    <div class="sep"></div>
    <div id="brush-wrap">
      <span>Brush</span>
      <input type="range" id="brng" min="1" max="24" value="3" step="1">
      <span id="blbl">3px</span>
    </div>
    <div class="sep"></div>
    <button class="btn" id="btn-brd">Borders ON</button>
    <button class="btn" id="btn-rst">Reset View</button>
    <button class="btn" id="btn-clr">Clear All</button>
    <div class="sep"></div>
    <button class="btn" id="btn-debug" style="background:#1a2510;border:1px solid rgba(134,239,172,0.3);color:#86efac;">&#43;100px</button>
    <button class="btn" id="btn-bomb">&#128163; Bomb</button>
    <span id="bomb-radius-label"></span>
    <div class="sep"></div>
    <div id="bucket-hud">
      <div id="bucket-bar"><div id="bucket-fill"></div></div>
      <span id="bucket-count">10</span>
      <span style="color:#334155">px</span>
      <span id="bucket-timer">+1 in 60s</span>
    </div>
    <div id="stats">4096×2048 · Claimed: <b id="px-count">0</b> px</div>
  </div>
  <div id="main">
  <div id="viewport">
    <div id="loading">
      <h2>Loading World</h2>
      <p id="load-msg">Starting…</p>
      <div id="prog-bar"><div id="prog-fill"></div></div>
      <div id="err-box"></div>
      <button id="retry-btn" onclick="location.reload()">Retry</button>
    </div>
    <div id="bomb-flash"></div>
    <canvas id="c-base"></canvas>
    <canvas id="c-waves" style="pointer-events:none"></canvas>
    <canvas id="c-claim"></canvas>
    <canvas id="c-flags"></canvas>
    <canvas id="c-border"></canvas>
    <canvas id="c-overlay" style="pointer-events:none;"></canvas>
    <div id="tip"><div id="tip-name"></div><div id="tip-sub"></div></div>
    <div id="banner"></div>
    <div id="bomb-toast"><div class="toast-title">&#128163; Bombing!</div><div class="toast-body" id="bomb-toast-body"></div></div>
    <div id="conquest-toast"><div class="toast-title">&#9873; Country Conquered</div><div class="toast-body" id="toast-body"></div></div>
    <div class="hud" id="legend"><h3>Territory</h3><div id="leg-items"></div></div>
    <div class="hud" id="zoom-hud">
      <button class="z-btn" id="zi">+</button>
      <button class="z-btn" id="zo">-</button>
    </div>
  </div><!-- /viewport -->

  <!-- ── Debug panel ── -->
  <div id="debug-panel">
    <div id="dbg-header">
      <span>Debug</span>
      <button id="dbg-close" title="Close">&#10005;</button>
    </div>

    <div class="dbg-section">
      <div class="dbg-label">Inventory</div>
      <button class="dbg-btn dbg-green" onclick="pixelBucket=Math.min(BUCKET_MAX,pixelBucket+100);updateBucketHUD()">+100 pixels</button>
      <button class="dbg-btn dbg-green" onclick="pixelBucket=BUCKET_MAX;updateBucketHUD()">Fill bucket</button>
      <button class="dbg-btn dbg-red"  onclick="pixelBucket=0;updateBucketHUD()">Empty bucket</button>
      <button class="dbg-btn dbg-green" onclick="
        if(!featList||!featList[currentIdx]){return;}
        if(!conqueredSet.has(currentIdx+':'+currentIdx)){
          conqueredSet.add(currentIdx+':'+currentIdx);
        }
        finisherFill(currentIdx,currentIdx);
      ">&#9660; Flood fill country</button>
    </div>

    <div class="dbg-section">
      <div class="dbg-label">Sounds</div>
      <button class="dbg-btn dbg-sound" onclick="sfxUIClick()">&#9654; UI click</button>
      <button class="dbg-btn dbg-sound" onclick="sfxPixelPlace()">&#9654; Pixel place</button>
      <button class="dbg-btn dbg-sound" onclick="sfxBucketRegen()">&#9654; Bucket regen</button>
      <button class="dbg-btn dbg-sound" onclick="sfxConquest()">&#9654; Conquest (generic)</button>
      <button class="dbg-btn dbg-sound" onclick="sfxFillSuccess()">&#9654; Fill success</button>
    </div>

    <div class="dbg-section">
      <div class="dbg-label">Unique country stings</div>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['840']&&COUNTRY_STINGS['840']()">&#127482;&#127480; USA</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['826']&&COUNTRY_STINGS['826']()">&#127468;&#127463; UK</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['643']&&COUNTRY_STINGS['643']()">&#127479;&#127482; Russia</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['276']&&COUNTRY_STINGS['276']()">&#127465;&#127466; Germany</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['250']&&COUNTRY_STINGS['250']()">&#127467;&#127479; France</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['156']&&COUNTRY_STINGS['156']()">&#127464;&#127475; China</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['392']&&COUNTRY_STINGS['392']()">&#127471;&#127477; Japan</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['356']&&COUNTRY_STINGS['356']()">&#127470;&#127475; India</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['76']&&COUNTRY_STINGS['76']()">&#127463;&#127479; Brazil</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['36']&&COUNTRY_STINGS['36']()">&#127462;&#127482; Australia</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['124']&&COUNTRY_STINGS['124']()">&#127464;&#127462; Canada</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['410']&&COUNTRY_STINGS['410']()">&#127472;&#127479; S. Korea</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['380']&&COUNTRY_STINGS['380']()">&#127470;&#127481; Italy</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['724']&&COUNTRY_STINGS['724']()">&#127466;&#127480; Spain</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['484']&&COUNTRY_STINGS['484']()">&#127474;&#127485; Mexico</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['682']&&COUNTRY_STINGS['682']()">&#127480;&#127462; Saudi Arabia</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['710']&&COUNTRY_STINGS['710']()">&#127487;&#127462; S. Africa</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['32']&&COUNTRY_STINGS['32']()">&#127462;&#127479; Argentina</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['566']&&COUNTRY_STINGS['566']()">&#127475;&#127468; Nigeria</button>
      <button class="dbg-btn dbg-sound" onclick="COUNTRY_STINGS['792']&&COUNTRY_STINGS['792']()">&#127481;&#127479; Turkey</button>
    </div>

    <div class="dbg-section">
      <div class="dbg-label">Regional fallbacks</div>
      <button class="dbg-btn dbg-sound" onclick="_stingFanfare()">&#9654; Western fanfare</button>
      <button class="dbg-btn dbg-sound" onclick="_stingSlavic()">&#9654; Slavic brass</button>
      <button class="dbg-btn dbg-sound" onclick="_stingPentatonic()">&#9654; E. Asian penta.</button>
      <button class="dbg-btn dbg-sound" onclick="_stingSouthAsian()">&#9654; S. Asian sitar</button>
      <button class="dbg-btn dbg-sound" onclick="_stingLatin()">&#9654; Latin samba</button>
      <button class="dbg-btn dbg-sound" onclick="_stingMiddleEast()">&#9654; Middle East</button>
      <button class="dbg-btn dbg-sound" onclick="_stingAfrican()">&#9654; African perc.</button>
      <button class="dbg-btn dbg-sound" onclick="_stingNordic()">&#9654; Nordic</button>
    </div>

    <div class="dbg-section">
      <div class="dbg-label">Bombs</div>
      <button class="dbg-btn dbg-bomb" onclick="sfxBombLight()">&#128163; Light  (r&le;30)</button>
      <button class="dbg-btn dbg-bomb" onclick="sfxBombMedium()">&#128163; Medium (r&gt;30)</button>
      <button class="dbg-btn dbg-bomb" onclick="sfxBombHeavy()">&#128163; Heavy  (r&gt;50)</button>
      <button class="dbg-btn dbg-bomb dbg-nuke" onclick="sfxBombNuclear()">&#9762; Nuclear (r&gt;70)</button>
    </div>

    <div class="dbg-section">
      <div class="dbg-label">State</div>
      <div class="dbg-stat">Bucket: <span id="dbg-bucket">—</span></div>
      <div class="dbg-stat">Claimed: <span id="dbg-claimed">—</span></div>
      <div class="dbg-stat">Conquered: <span id="dbg-conquered">—</span></div>
    </div>
  </div><!-- /debug-panel -->

  </div><!-- /main -->
</div>

// ── Constants ─────────────────────────────────────────────────────
const MAP_W=4096, MAP_H=2048, MAP_PX=MAP_W*MAP_H;

// ── Sound engine (Web Audio API — no external files) ─────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function getACtx(){
  if(!_actx){ try{ _actx = new AudioCtx(); }catch(e){ return null; } }
  // Resume on first user gesture
  if(_actx.state === 'suspended') _actx.resume();
  return _actx;
}

// Generic helper: play a shaped tone
function playTone(freq, type, duration, gainPeak, fadeStart, opts={}){
  const ctx = getACtx(); if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if(opts.freqEnd) osc.frequency.exponentialRampToValueAtTime(opts.freqEnd, ctx.currentTime + duration);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(gainPeak, ctx.currentTime + 0.005);
  gain.gain.setValueAtTime(gainPeak, ctx.currentTime + fadeStart);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

// White noise burst helper
function playNoise(duration, gainPeak, fadeStart){
  const ctx = getACtx(); if(!ctx) return;
  const bufSize = Math.floor(ctx.sampleRate * duration);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
  const src = ctx.createBufferSource();
  const gain = ctx.createGain();
  // Bandpass filter to shape noise
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 0.8;
  src.buffer = buf;
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(gainPeak, ctx.currentTime);
  gain.gain.setValueAtTime(gainPeak, ctx.currentTime + fadeStart);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  src.start(ctx.currentTime);
  src.stop(ctx.currentTime + duration);
}

// Short sine blip at ~1200Hz, very brief
let _lastPixelSoundAt = 0;
function sfxPixelPlace(){
  const now = performance.now();
  // Throttle: max one sound per 80ms to avoid overwhelming when dragging
  if(now - _lastPixelSoundAt < 80) return;
  _lastPixelSoundAt = now;
  playTone(1200, 'sine', 0.07, 0.12, 0.01, {freqEnd: 900});
}

// ── Sound: bomb — 4 tiers based on radius ────────────────────────
// Light   r>20 : short crack + light noise
// Medium  r>30 : deeper thud + mid noise
// Heavy   r>50 : low rumble + heavy noise burst + sub-bass
// Nuclear r>70 : massive sub-bass + distorted rumble + reverb tail + high whine

function sfxBombLight(){
  // Sharp crack — quick attack, high-ish noise, short decay
  playTone(320, 'sawtooth', 0.18, 0.35, 0.02, {freqEnd: 80});
  setTimeout(()=>playNoise(0.18, 0.28, 0.03), 10);
}

function sfxBombMedium(){
  // Solid thud — mid-range sine punch + sharper noise
  playTone(200, 'sine', 0.28, 0.55, 0.04, {freqEnd: 45});
  setTimeout(()=>playNoise(0.32, 0.42, 0.06), 15);
  playTone(100, 'square', 0.12, 0.3, 0.02, {freqEnd: 35});
}

function sfxBombHeavy(){
  // Deep rumble — low sine sweep + heavy noise + sub punch
  const ctx = getACtx(); if(!ctx) return;
  playTone(160, 'sine', 0.45, 0.7, 0.05, {freqEnd: 30});
  setTimeout(()=>playNoise(0.55, 0.65, 0.08), 20);
  playTone(70, 'square', 0.20, 0.5, 0.03, {freqEnd: 25});
  // Secondary crack at 80ms
  setTimeout(()=>playTone(280, 'sawtooth', 0.15, 0.2, 0.03, {freqEnd: 60}), 80);
}

function sfxBombNuclear(){
  // Nuclear: massive layered explosion with reverb tail and whine
  const ctx = getACtx(); if(!ctx) return;
  // Enormous sub-bass drop
  playTone(120, 'sine', 0.9, 0.9, 0.04, {freqEnd: 18});
  // Distorted low rumble
  playTone(55, 'sawtooth', 0.7, 0.8, 0.06, {freqEnd: 20});
  // Heavy noise wall
  setTimeout(()=>playNoise(0.85, 0.85, 0.10), 10);
  // Mid crack
  setTimeout(()=>playTone(240, 'sawtooth', 0.25, 0.4, 0.04, {freqEnd: 50}), 30);
  // Long rumble tail
  setTimeout(()=>playNoise(0.9, 0.35, 0.3), 120);
  // Eerie high-pitched whine (the "nuclear" signature)
  setTimeout(()=>playTone(1800, 'sine', 0.7, 0.18, 0.05, {freqEnd: 400}), 60);
  // Distant echo
  setTimeout(()=>playTone(80, 'sine', 0.4, 0.15, 0.08, {freqEnd: 22}), 300);
}

// pixels = bucket count BEFORE spending (determines tier)
// Light   >20px  Medium >30px  Heavy >50px  Nuclear >70px
function sfxBomb(pixels){
  if(pixels > 70)      sfxBombNuclear();
  else if(pixels > 50) sfxBombHeavy();
  else if(pixels > 30) sfxBombMedium();
  else                 sfxBombLight();
}

// ── Sound: boundary fill success — satisfying swoosh + settle ────
function sfxFillSuccess(){
  const ctx = getACtx(); if(!ctx) return;
  // Rising whoosh: frequency sweeps up quickly then settles
  playTone(300, 'sine', 0.22, 0.18, 0.04, {freqEnd: 680});
  // Soft harmonic layer slightly delayed
  setTimeout(()=>playTone(600, 'sine', 0.18, 0.10, 0.06, {freqEnd: 900}), 40);
  // Short noise burst — like pixels snapping into place
  setTimeout(()=>playNoise(0.12, 0.18, 0.04), 20);
}

// This is ALL we need — no d3-geo required.
function project(lon,lat){ return [(lon+180)/360*MAP_W, (90-lat)/180*MAP_H]; }

// ── Draw a GeoJSON geometry ring onto a canvas context ────────────
// Handles Polygon and MultiPolygon, calls ctx.beginPath/fill externally
// Split a lon/lat ring into sub-rings wherever it crosses the antimeridian (lon=±180).
// Without this, countries like Russia, USA (Alaska), and Fiji draw a stroke
// across the entire map width.
function splitAntimeridian(ring){
  const out=[];
  let cur=[];
  for(let i=0;i<ring.length;i++){
    const [lon,lat]=ring[i];
    if(i===0){cur.push([lon,lat]);continue;}
    const [pLon,pLat]=ring[i-1];
    const dLon=lon-pLon;
    if(Math.abs(dLon)>180){
      // Interpolate latitude at the crossing edge
      const fromSide=dLon>0?-180:180;
      const toSide=dLon>0?180:-180;
      // How far along [pLon→lon+/-360] is the crossing at fromSide?
      const span=dLon>0?(lon-pLon-360):(lon-pLon+360);
      const t=(fromSide-pLon)/span;
      const crossLat=pLat+t*(lat-pLat);
      cur.push([fromSide,crossLat]);
      if(cur.length>=2)out.push(cur);
      cur=[[toSide,crossLat],[lon,lat]];
    }else{
      cur.push([lon,lat]);
    }
  }
  if(cur.length>=2)out.push(cur);
  return out;
}

function drawRing(ctx,ring){
  for(const sub of splitAntimeridian(ring)){
    if(sub.length<2) continue; // skip empty (filtered bounding arcs)
    // Skip degenerate bounding arcs: sub-rings that are nearly horizontal
    // and very wide (bounding box arcs from Natural Earth data).
    // These produce horizontal line artifacts through Australia, Africa, etc.
    if(sub.length>=2){
      let minY=Infinity,maxY=-Infinity,minX=Infinity,maxX=-Infinity;
      for(const [lon,lat] of sub){
        const [x,y]=project(lon,lat);
        if(y<minY)minY=y;if(y>maxY)maxY=y;
        if(x<minX)minX=x;if(x>maxX)maxX=x;
      }
      // If the ring is taller than 3px it's a real shape, not a bounding line
      if(maxY-minY<2 && maxX-minX>100) continue;
    }
    let first=true;
    for(const [lon,lat] of sub){
      const [x,y]=project(lon,lat);
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    }
    ctx.closePath();
  }
}

function drawGeometry(ctx,geom){
  if(!geom)return;
  if(geom.type==="Polygon"){
    for(const ring of geom.coordinates)drawRing(ctx,ring);
  }else if(geom.type==="MultiPolygon"){
    for(const poly of geom.coordinates)for(const ring of poly)drawRing(ctx,ring);
  }
}

// ── TopoJSON decoder — minimal, no dependencies ───────────────────
// Decodes topojson arcs with delta encoding + dequantization
function topoFeatures(topo){
  const sc=topo.transform?topo.transform.scale:[1,1];
  const tr=topo.transform?topo.transform.translate:[0,0];
  const rawArcs=topo.arcs;

  // Decode a single arc (delta decode + dequantize)
  function decodeArc(i){
    const rev=i<0; const arc=rawArcs[rev?~i:i];
    let x=0,y=0;
    const pts=arc.map(([dx,dy])=>{x+=dx;y+=dy;return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});
    return rev?pts.reverse():pts;
  }

  // isBoundingArc: returns true if all points in a ring are within 0.05° lat
  // of each other AND span more than 5° lon — definitively a clipping/bounding arc.
  function isBoundingArc(pts){
    if(pts.length<2) return false;
    let minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;
    for(const [lon,lat] of pts){
      if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat;
      if(lon<minLon)minLon=lon; if(lon>maxLon)maxLon=lon;
    }
    return (maxLat-minLat)<0.05 && (maxLon-minLon)>5;
  }

  function arcRing(r){
    const pts=r.flatMap(i=>decodeArc(i));
    return isBoundingArc(pts)?[]:pts;
  }

  function geomToGeoJSON(g){
    if(!g)return null;
    if(g.type==="Polygon") return{type:"Polygon",coordinates:g.arcs.map(arcRing)};
    if(g.type==="MultiPolygon") return{type:"MultiPolygon",coordinates:g.arcs.map(p=>p.map(arcRing))};
    return null;
  }

  return topo.objects.countries.geometries.map(g=>({
    id:String(g.id??""),
    name:(g.properties&&g.properties.name)||"",
    geometry:geomToGeoJSON(g)
  }));
}

      row.push(f.p[idx]);
    }
    rows.push(row);
  }
  return rows;
}

// Track placed flags: geoIdx -> {claimerIdx, cx, cy}
const placedFlags={};

// Compute centroid of pixels owned by claimerIdx in geo country geoIdx
function getGeoCentroid(geoIdx, claimerIdx){
  let sx=0,sy=0,n=0;
  for(let i=0;i<MAP_PX;i++){
    if(featByPixel[i]===geoIdx&&claimByPixel[i]===claimerIdx){
      sx+=i%MAP_W; sy+=(i/MAP_W)|0; n++;
    }
  }
  if(n===0) return null;
  return{x:Math.round(sx/n), y:Math.round(sy/n)};
}

// Draw a flag at pixel position (cx,cy) - centered on that pixel
function drawFlagAt(cx,cy,claimer){
  const rows=decodeFlag(claimer.id);
  if(!rows) return;
  const ox=cx-Math.floor(FLAG_W/2);
  const oy=cy-Math.floor(FLAG_H/2);
  const img=flagCtx.createImageData(FLAG_W+2,FLAG_H+2);
  const d=img.data;
  // Black 1px outline
  for(let y=0;y<FLAG_H+2;y++) for(let x=0;x<FLAG_W+2;x++){
    const p=(y*(FLAG_W+2)+x)*4;
    d[p]=0;d[p+1]=0;d[p+2]=0;d[p+3]=255;
  }
  // Flag pixels
  for(let y=0;y<FLAG_H;y++){
    for(let x=0;x<FLAG_W;x++){
      const col=rows[y][x];
      const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
      const p=((y+1)*(FLAG_W+2)+(x+1))*4;
      d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=255;
    }
  }
  flagCtx.putImageData(img, ox-1, oy-1);
}

// Place or update the flag for a conquered geo country
function placeFlag(geoIdx, claimerIdx){
  // Find centroid (throttled — only sample every 8th pixel for speed)
  let sx=0,sy=0,n=0;
  for(let i=0;i<MAP_PX;i+=8){
    if(featByPixel[i]===geoIdx&&claimByPixel[i]===claimerIdx){
      sx+=i%MAP_W; sy+=(i/MAP_W)|0; n++;
    }
  }
  if(n===0) return;
  const cx=Math.round(sx/n), cy=Math.round(sy/n);
  placedFlags[geoIdx]={claimerIdx,cx,cy};
  drawFlagAt(cx,cy,featList[claimerIdx]);
}

// Erase a flag for a geo country (when recaptured)
function eraseFlag(geoIdx){
  const f=placedFlags[geoIdx];
  if(!f) return;
  const ox=f.cx-Math.floor(FLAG_W/2)-1;
  const oy=f.cy-Math.floor(FLAG_H/2)-1;
  flagCtx.clearRect(ox,oy,FLAG_W+2,FLAG_H+2);
  delete placedFlags[geoIdx];
}


// ── finisherFill: claim all remaining pixels when 80% hit ───────────────────
function finisherFill(geoIdx,claimerIdx){
  const [r,g,b]=hexRgb(featList[claimerIdx].color);
  const toFill=[];
  for(let i=0;i<MAP_PX;i++){
    if(featByPixel[i]!==geoIdx||claimByPixel[i]===claimerIdx||!landMask[i])continue;
    toFill.push(i);
  }
  for(const gi of toFill){
    const prev=claimByPixel[gi];
    if(prev>=0){
      claimerCount[prev]=Math.max(0,(claimerCount[prev]||1)-1);
      if(geoClaimCnt[geoIdx]&&geoClaimCnt[geoIdx][prev])
        geoClaimCnt[geoIdx][prev]=Math.max(0,(geoClaimCnt[geoIdx][prev]||1)-1);
      const prevKey=geoIdx+":"+prev;
      if(conqueredSet.has(prevKey)){conqueredSet.delete(prevKey);eraseFlag(geoIdx);}
    }else{totalClaimed++;}
    claimByPixel[gi]=claimerIdx;
    claimerCount[claimerIdx]=(claimerCount[claimerIdx]||0)+1;
    if(!geoClaimCnt[geoIdx])geoClaimCnt[geoIdx]={};
    geoClaimCnt[geoIdx][claimerIdx]=(geoClaimCnt[geoIdx][claimerIdx]||0)+1;
  }
  if(toFill.length>0){
    let fx0=MAP_W,fy0=MAP_H,fx1=0,fy1=0;
    for(const gi of toFill){const px=gi%MAP_W,py=(gi/MAP_W)|0;if(px<fx0)fx0=px;if(px>fx1)fx1=px;if(py<fy0)fy0=py;if(py>fy1)fy1=py;}
    const fw=fx1-fx0+1,fh=fy1-fy0+1;
    const img=claimCtx.getImageData(fx0,fy0,fw,fh);const d=img.data;
    for(const gi of toFill){const px=(gi%MAP_W)-fx0,py=((gi/MAP_W)|0)-fy0;const p=(py*fw+px)*4;d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=215;}
    claimCtx.putImageData(img,fx0,fy0);
  }
  $("px-count").textContent=totalClaimed.toLocaleString();
  scheduleLegend();
  setTimeout(()=>placeFlag(geoIdx,claimerIdx),0);
}

// ── checkConquest: 80% threshold check ───────────────────────────────────────
function checkConquest(geoIdx,claimerIdx){
  const key=geoIdx+":"+claimerIdx;
  if(conqueredSet.has(key))return false;
  const owned=(geoClaimCnt[geoIdx]&&geoClaimCnt[geoIdx][claimerIdx])||0;
  const total=geoTotal[geoIdx]||0;
  if(total===0||owned/total<CONQUEST_THRESHOLD)return false;
  conqueredSet.add(key);
  sfxConquestFor(claimerIdx);
  showConquestToast(geoIdx,claimerIdx);
  refreshCsel();
  const bn=$("banner");
  bn.innerHTML="&#9873; <span style='color:"+featList[claimerIdx].color+"'>"
    +featList[claimerIdx].name+"</span> conquered <b>"+featList[geoIdx].name+"</b>!";
  bn.style.display="block";clearTimeout(bn._t);bn._t=setTimeout(()=>bn.style.display="none",4000);
  setTimeout(()=>finisherFill(geoIdx,claimerIdx),0);
  return true;
}

// ── checkConquestReversal: only erase if drops below threshold ───────────────
function checkConquestReversal(geoIdx,prev){
  const key=geoIdx+":"+prev;
  if(!conqueredSet.has(key))return;
  const owned=(geoClaimCnt[geoIdx]&&geoClaimCnt[geoIdx][prev])||0;
  const total=geoTotal[geoIdx]||0;
  if(total===0||owned/total<CONQUEST_THRESHOLD){conqueredSet.delete(key);eraseFlag(geoIdx);refreshCsel();}
}

// ── Ocean zone colour ─────────────────────────────────────────────
// Returns [r,g,b] for an ocean pixel based on lat/lon.
// Zones reference: NOAA ocean zones, GEBCO depth data generalised.
// Base ocean: #005484 = [0,84,132]
function oceanColour(lat,lon){
  const absLat=Math.abs(lat);
  let or=0,og=84,ob=132; // deep ocean base #005484

  // Latitude baseline tint
  if(absLat>70)          {or=0; og=78; ob=128;} // polar — cool grey-blue
  else if(absLat>60)     {or=0; og=80; ob=130;} // sub-polar
  else if(absLat>45)     {or=0; og=83; ob=132;} // temperate
  else if(absLat>23)     {or=0; og=85; ob=134;} // subtropical
  else                   {or=0; og=88; ob=138;} // tropical — slightly brighter

  // ── Named ocean basins (deeper = darker, shallower = lighter) ──

  // Arctic Ocean (very cold, shallow over shelf)
  if(lat>70)                                          {or=0; og=74;ob=122;}
  // Antarctic circumpolar (dark deep)
  if(lat<-55)                                         {or=0; og=76;ob=124;}
  // Southern Ocean 40-55S (stormy, dark)
  if(lat<-40&&lat>-55)                               {or=0; og=79;ob=127;}

  // North Atlantic deep water
  if(lat>45&&lat<65&&lon>-45&&lon<0)                 {or=0; og=80;ob=128;}
  // Tropical Atlantic — warm
  if(lat>-15&&lat<20&&lon>-55&&lon<15)               {or=0; og=88;ob=138;}
  // Caribbean — shallow, turquoise
  if(lat>10&&lat<28&&lon>-90&&lon<-58)               {or=0; og=100;ob=148;}
  // Gulf of Mexico — shallow/warm
  if(lat>20&&lat<30&&lon>-98&&lon<-80)               {or=0; og=95;ob=144;}

  // Mediterranean Sea — darker blue
  if(lat>30&&lat<47&&lon>-6&&lon<42)                 {or=0; og=80;ob=126;}
  // Black Sea
  if(lat>40&&lat<48&&lon>28&&lon<42)                 {or=0; og=78;ob=124;}
  // Red Sea — warm, narrow
  if(lat>12&&lat<30&&lon>32&&lon<44)                 {or=0; og=90;ob=140;}
  // Persian Gulf — very shallow/warm
  if(lat>23&&lat<30&&lon>48&&lon<57)                 {or=0; og=96;ob=148;}
  // Arabian Sea
  if(lat>8&&lat<25&&lon>55&&lon<75)                  {or=0; og=87;ob=136;}
  // Bay of Bengal
  if(lat>8&&lat<22&&lon>80&&lon<100)                 {or=0; og=86;ob=135;}

  // Indian Ocean — warm tropical
  if(lat>-30&&lat<8&&lon>60&&lon<100)                {or=0; og=88;ob=138;}
  // Tropical Indian Ocean shallows (Maldives zone)
  if(lat>-5&&lat<10&&lon>72&&lon<80)                 {or=0; og=98;ob=150;}

  // South China Sea — warm shallow
  if(lat>5&&lat<25&&lon>105&&lon<122)                {or=0; og=92;ob=142;}
  // East China/Yellow Sea — shallow
  if(lat>25&&lat<42&&lon>120&&lon<130)               {or=0; og=90;ob=140;}
  // Sea of Japan
  if(lat>34&&lat<52&&lon>128&&lon<142)               {or=0; og=82;ob=130;}
  // Coral Sea / Great Barrier Reef zone
  if(lat>-26&&lat<-10&&lon>145&&lon<158)             {or=0; og=94;ob=144;}
  // Tasman Sea
  if(lat>-45&&lat<-28&&lon>148&&lon<175)             {or=0; og=82;ob=131;}

  // North Pacific deep (very deep)
  if(lat>30&&lat<60&&lon>150&&lon<-140)              {or=0; og=79;ob=127;}
  if(lat>30&&lat<60&&lon>-200&&lon<-140)             {or=0; og=79;ob=127;}
  // Tropical Pacific — warm, vast
  if(lat>-15&&lat<15&&lon>-180&&lon<-80)             {or=0; og=88;ob=138;}
  if(lat>-15&&lat<15&&lon>140&&lon<180)              {or=0; og=88;ob=138;}
  // Pacific ITCZ/warm pool (W Pacific around Indonesia)
  if(lat>-8&&lat<8&&lon>125&&lon<160)                {or=0; og=92;ob=142;}

  // Hudson Bay — cold shallow
  if(lat>55&&lat<65&&lon>-95&&lon<-75)               {or=0; og=80;ob=128;}
  // Baltic Sea — brackish, shallower
  if(lat>54&&lat<66&&lon>10&&lon<30)                 {or=0; og=82;ob=130;}
  // North Sea — shallow
  if(lat>51&&lat<62&&lon>-4&&lon<10)                 {or=0; og=84;ob=132;}

  return [or,og,ob];
}
// ── Boot ─────────────────────────────────────────────────────────
// No external libraries needed at all — just fetch the TopoJSON data.
async function boot(){
  prog(5,"Fetching world map data (~2.3MB)…");
  const dlAnim=animateProgress(5,18,6000,"Downloading Natural Earth 10m countries…");

  let topo;
  try{
    const r=await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json");
    if(!r.ok)throw new Error("HTTP "+r.status);
    topo=await r.json();
  }catch(e){
    await dlAnim;
    throw new Error("Could not fetch map data: "+e.message);
  }
  await dlAnim;
  console.log("TopoJSON fetched. Arcs:",topo.arcs.length,"Geometries:",topo.objects.countries.geometries.length);

  prog(20,"Decoding country geometries…");await sleep(8);

  // Decode TopoJSON → plain GeoJSON features using our own decoder
  const rawFeats=topoFeatures(topo);
  console.log("Decoded features:",rawFeats.length);

  // Build featList
  featList=rawFeats.map(f=>{
    const db=DB[f.id];
    return{id:f.id, name:db?db.n:(f.name||"Territory "+f.id), color:db?db.c:seededColor(f.id), geometry:f.geometry};
  });

  // Populate country selector (alphabetical)
  const csel=$("csel"); csel.innerHTML="";
  [...featList].sort((a,b)=>a.name.localeCompare(b.name)).forEach(f=>{
    const o=document.createElement("option");o.value=featList.indexOf(f);o.textContent=f.name;csel.appendChild(o);
  });
  const usaIdx=featList.findIndex(f=>f.id==="840");
  currentIdx=usaIdx>=0?usaIdx:0; csel.value=currentIdx;
  const sw=$("swatch"); sw.style.background=featList[currentIdx].color;
  csel.onchange=e=>{currentIdx=+e.target.value;sw.style.background=featList[currentIdx].color;};

  // ── Render base map on main canvas ───────────────────────────
  prog(25,"Rendering base map…");
  bctx.fillStyle="#005484"; bctx.fillRect(0,0,MAP_W,MAP_H);

  for(let i=0;i<featList.length;i++){
    const f=featList[i];
    if(!f.geometry)continue;
    const [r,g,b]=hexRgb(f.color);
    bctx.fillStyle="rgb("+Math.floor(r*.22+28)+","+Math.floor(g*.22+36)+","+Math.floor(b*.22+24)+")";
    bctx.beginPath();
    drawGeometry(bctx,f.geometry);
    bctx.fill("evenodd");
    if(i%20===0){prog(25+Math.floor(i/featList.length*27),"Rendering countries… "+(i+1)+"/"+featList.length);await sleep(1);}
  }
  console.log("Base map rendered");

  // ── Build pixel-country mask on offscreen canvas ──────────────
  // Encode feat index as: R=hi byte, G=lo byte, B=200 (land marker)
  prog(54,"Building country mask…"); await sleep(8);
  const mc=document.createElement("canvas"); mc.width=MAP_W; mc.height=MAP_H;
  const mctx=mc.getContext("2d",{willReadFrequently:true});
  if(!mctx) throw new Error("Failed to get offscreen canvas context");
  mctx.imageSmoothingEnabled=false;
  mctx.fillStyle="#000000"; mctx.fillRect(0,0,MAP_W,MAP_H);

  for(let i=0;i<featList.length;i++){
    const f=featList[i];
    if(!f.geometry)continue;
    mctx.fillStyle="rgb("+((i>>8)&0xFF)+","+(i&0xFF)+",200)";
    mctx.beginPath();
    drawGeometry(mctx,f.geometry);
    mctx.fill("evenodd");
    if(i%20===0){prog(54+Math.floor(i/featList.length*18),"Building mask… "+(i+1)+"/"+featList.length);await sleep(1);}
  }
  console.log("Mask rendered");

  // ── Extract mask pixels → typed arrays ───────────────────────
  prog(74,"Extracting pixel data…"); await sleep(8);
  const raw=mctx.getImageData(0,0,MAP_W,MAP_H).data;
  featByPixel =new Int16Array(MAP_PX).fill(-1);
  claimByPixel=new Int16Array(MAP_PX).fill(-1);
  landMask    =new Uint8Array(MAP_PX);

  const CHUNK=524288;
  for(let s=0;s<MAP_PX;s+=CHUNK){
    const end=Math.min(s+CHUNK,MAP_PX);
    for(let i=s;i<end;i++){
      if(raw[i*4+2]>=190){
        landMask[i]=1;
        const idx=(raw[i*4]<<8)|raw[i*4+1];
        if(idx<featList.length){featByPixel[i]=idx;geoTotal[idx]=(geoTotal[idx]||0)+1;}
      }
    }
    prog(74+Math.floor(s/MAP_PX*10),"Processing pixels…");
    await sleep(1);
  }
  const landPx=Object.values(geoTotal).reduce((a,b)=>a+b,0);
  console.log("Pixel extraction done. Land px:",landPx,"Countries with land:",Object.keys(geoTotal).length);

  // ── Remove micro-islands (<10 connected pixels) ───────────────────────────
  // Flood-fill each connected land component. Any component with <50 pixels
  // gets removed from landMask and featByPixel (treated as ocean).
  prog(84,"Removing micro-islands…"); await sleep(5);
  {
    const visited=new Uint8Array(MAP_PX);
    const DX2=[-1,1,0,0],DY2=[0,0,-1,1];
    let removed=0;
    for(let seed=0;seed<MAP_PX;seed++){
      if(!landMask[seed]||visited[seed]) continue;
      // BFS to find this connected component
      const component=[];
      const q=[seed]; visited[seed]=1;
      let qh=0;
      while(qh<q.length){
        const ci=q[qh++];
        component.push(ci);
        const cx=ci%MAP_W,cy=(ci/MAP_W)|0;
        for(let d=0;d<4;d++){
          const nx=cx+DX2[d],ny=cy+DY2[d];
          if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
          const ni=ny*MAP_W+nx;
          if(landMask[ni]&&!visited[ni]){visited[ni]=1;q.push(ni);}
        }
      }
      if(component.length<50){
        // Remove this micro-island
        for(const ci of component){
          landMask[ci]=0;
          const geo=featByPixel[ci];
          if(geo>=0&&geoTotal[geo]){
            geoTotal[geo]=Math.max(0,geoTotal[geo]-1);
          }
          featByPixel[ci]=-1;
        }
        removed+=component.length;
      }
    }
    console.log("Micro-islands removed:",removed,"pixels");
  }

  // ── Draw borders on border canvas ────────────────────────────
  
// ── Rebuild base map pixel-perfect from mask — no antialiased edges ──
  // Replace every canvas-drawn pixel with an exact colour from featByPixel.
  // Canvas fill() always antialiases polygon edges; this step eliminates that.
  prog(87,"Culling antialiased edge pixels…"); await sleep(5);
  {
    const cleanImg=bctx.createImageData(MAP_W,MAP_H);
    const cd=cleanImg.data;
    for(let i=0;i<MAP_PX;i++){
      const p=i*4;
      if(landMask[i]){
        // ── Biome terrain tint ─────────────────────────────────────────
        // Sources: Whittaker 1975, WWF Terrestrial Ecoregions (Olson et al 2001),
        //          National Geographic Biome Map, Bailey 1989 ecoregions
        // Values within ±12 of base 90,90,90 — subtle texture not vivid colour
        const tx=i%MAP_W, ty=(i/MAP_W)|0;
        const lon=(tx/MAP_W)*360-180;
        const lat=90-(ty/MAP_H)*180;
        const absLat=Math.abs(lat);
        let tr=90,tg=90,tb=90;

        // ── Latitude baseline (Whittaker zones) ──────────────────────────────
        if(absLat>75)        {tr=84;tg=86;tb=93;}  // polar/high arctic
        else if(absLat>65)   {tr=83;tg=85;tb=91;}  // arctic tundra
        else if(absLat>55)   {tr=81;tg=87;tb=82;}  // boreal
        else if(absLat>47)   {tr=83;tg=89;tb=83;}  // cool temperate
        else if(absLat>40)   {tr=87;tg=90;tb=83;}  // temperate
        else if(absLat>30)   {tr=94;tg=90;tb=79;}  // subtropical dry
        else if(absLat>20)   {tr=90;tg=89;tb=76;}  // tropical dry/savanna
        else if(absLat>8)    {tr=85;tg=89;tb=74;}  // tropical monsoon

        // POLAR & TUNDRA
        if(lat>72&&lon>-58&&lon<-18)                              {tr=85;tg=88;tb=96;} // Greenland
        if(lat>68&&lon>-120&&lon<-65)                             {tr=84;tg=87;tb=94;} // Canadian Arctic

// ── Claim pixels ──────────────────────────────────────────────────
function claimPixel(px,py){
  if(px<0||px>=MAP_W||py<0||py>=MAP_H)return;
  const i=py*MAP_W+px;
  if(!landMask[i])return;
  const prev=claimByPixel[i];
  if(prev===currentIdx)return;
  const geo=featByPixel[i];
  if(prev>=0){
    claimerCount[prev]=(claimerCount[prev]||1)-1;
    if(geo>=0&&geoClaimCnt[geo]){
      geoClaimCnt[geo][prev]=(geoClaimCnt[geo][prev]||1)-1;
      checkConquestReversal(geo,prev);
    }
  }else{totalClaimed++;$("px-count").textContent=totalClaimed.toLocaleString();}
  claimByPixel[i]=currentIdx;
  // Track which geo countries this stroke touches (for auto-fill)
  if(geo>=0) strokeGeos.add(geo);
  claimerCount[currentIdx]=(claimerCount[currentIdx]||0)+1;
  if(geo>=0){
    if(!geoClaimCnt[geo])geoClaimCnt[geo]={};
    geoClaimCnt[geo][currentIdx]=(geoClaimCnt[geo][currentIdx]||0)+1;
       checkConquest(geo,currentIdx);
  }
  const [r,g,b]=hexRgb(featList[currentIdx].color);
  const id=claimCtx.createImageData(1,1);
  id.data[0]=r;id.data[1]=g;id.data[2]=b;id.data[3]=215;
  claimCtx.putImageData(id,px,py);
}

function paintBrush(px,py){
  // Inventory gate: each brush call costs 1 pixel
  if(pixelBucket<=0) return;
  pixelBucket--;
  updateBucketHUD();
  sfxPixelPlace();
  const half=Math.floor(brushSize/2),rsq=(brushSize/2)**2;
  for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){
    if(brushSize>3&&dx*dx+dy*dy>rsq)continue;
    claimPixel(px+dx,py+dy);
  }
  scheduleLegend();
}

// ── Auto-fill enclosed regions ────────────────────────────────────────────
// CORRECT ALGORITHM:
// For each geographic country the stroke touches:
//   1. Seed BFS from that country's border pixels (pixels adjacent to ocean/other country)
//      that have not been claimed by the current player.
//   2. Flood inward through the country, stopping at own claimed pixels.
//   3. Any country pixel NOT reached = truly enclosed by the player's stroke.
//
// This means:
//   - Incomplete strokes fill nothing (no enclosed region exists)
//   - Fills are bounded by the geographic country border automatically
//   - You cannot fill across country borders
//   - Small border completes a loop → only the loop interior fills
const MAX_FILL_PX = 500000; // safety cap
const CONQUEST_THRESHOLD = 0.8; // 80% triggers conquest

function isWallFill(i){
  if(!landMask[i]) return true;               // ocean: wall
  if(claimByPixel[i]===currentIdx) return true; // own pixels: wall
  // border pixels are NOT walls for seeding (they're the seeds themselves)
  // enemy pixels are passable (get captured)
  return false;
}

// Track which geo countries the current stroke has painted in
let strokeGeos = new Set();

function runAutoFill(){
  if(!bordPixel||strokeGeos.size===0)return;
  const geosToCheck = new Set(strokeGeos);
  strokeGeos = new Set(); // reset for next stroke

  const DX=[-1,1,0,0], DY=[0,0,-1,1];

  for(const geo of geosToCheck){
    if(geo<0) continue;

    // BFS seeded from geo-country border pixels (adjacent to outside/other country)
    // that are accessible (not blocked by own claimed pixels)
    const outside=new Uint8Array(MAP_PX);
    const queue=new Int32Array(geoTotal[geo]||100000);
    let head=0, tail=0;

    function enqGeo(i){
      if(outside[i]||isWallFill(i))return;
      outside[i]=1; queue[tail++]=i;
    }

    // Seed: scan all pixels of this geo country for border pixels
    // bordPixel[i]=1 means adjacent to different geo or ocean
    for(let i=0;i<MAP_PX;i++){
      if(featByPixel[i]===geo && bordPixel[i]===1) enqGeo(i);
    }

    // BFS inward through the geo country
    while(head<tail){
      const i=queue[head++];
      const x=i%MAP_W, y=(i/MAP_W)|0;
      for(let d=0;d<4;d++){
        const nx=x+DX[d], ny=y+DY[d];
        if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
        const ni=ny*MAP_W+nx;
        if(featByPixel[ni]!==geo||outside[ni]||isWallFill(ni)) continue;
        outside[ni]=1; queue[tail++]=ni;
      }
    }

    // Collect enclosed: in this geo country, not reachable from border, not own pixel
    const enclosed=[];
    for(let i=0;i<MAP_PX;i++){
      if(featByPixel[i]===geo && !outside[i] && !isWallFill(i)) enclosed.push(i);
    }

    if(enclosed.length===0||enclosed.length>MAX_FILL_PX) continue;

    // Claim enclosed pixels
    const [r,g,b]=hexRgb(featList[currentIdx].color);
    for(const gi of enclosed){
      const prev=claimByPixel[gi];
      if(prev>=0){
        claimerCount[prev]=(claimerCount[prev]||1)-1;
        if(geoClaimCnt[geo]&&geoClaimCnt[geo][prev])
          geoClaimCnt[geo][prev]=Math.max(0,(geoClaimCnt[geo][prev]||1)-1);
      }else{
        totalClaimed++;
      }
      claimByPixel[gi]=currentIdx;
      claimerCount[currentIdx]=(claimerCount[currentIdx]||0)+1;
      if(!geoClaimCnt[geo])geoClaimCnt[geo]={};
      geoClaimCnt[geo][currentIdx]=(geoClaimCnt[geo][currentIdx]||0)+1;
    }

    // Batch paint enclosed pixels to claim canvas
    const fillX0=enclosed.reduce((m,gi)=>Math.min(m,gi%MAP_W),MAP_W);
    const fillY0=enclosed.reduce((m,gi)=>Math.min(m,(gi/MAP_W)|0),MAP_H);
    const fillX1=enclosed.reduce((m,gi)=>Math.max(m,gi%MAP_W),0);
    const fillY1=enclosed.reduce((m,gi)=>Math.max(m,(gi/MAP_W)|0),0);
    const fw=fillX1-fillX0+1, fh=fillY1-fillY0+1;
    const fillImg=claimCtx.getImageData(fillX0,fillY0,fw,fh);
    const fd=fillImg.data;
    for(const gi of enclosed){
      const fx=(gi%MAP_W)-fillX0, fy=((gi/MAP_W)|0)-fillY0;
      const fp=(fy*fw+fx)*4;
      fd[fp]=r;fd[fp+1]=g;fd[fp+2]=b;fd[fp+3]=215;
    }
    claimCtx.putImageData(fillImg,fillX0,fillY0);
    sfxFillSuccess();
    checkConquest(geo,currentIdx);
  }

  $("px-count").textContent=totalClaimed.toLocaleString();
  scheduleLegend();
  // Check conquest for all geo countries affected by this fill
  const affectedGeos=new Set(enclosed.map(gi=>featByPixel[gi]).filter(g=>g>=0));
  for(const geoIdx of affectedGeos) checkConquest(geoIdx,currentIdx);
}

// ── Bomb functionality ────────────────────────────────────────────
// Radius = floor(sqrt(pixelBucket)) so 100px → r=10, 25px → r=5, 4px → r=2
// Bomb costs ALL pixels in bucket
// Clears (unclaims) every pixel within the circle on the map canvas

function detonateBomb(mapX, mapY){
  if(pixelBucket<=0){ return; }
  const radius = Math.floor(Math.sqrt(pixelBucket));
  if(radius<1){ return; }

  // Spend all pixels
  const pixelsForSound = pixelBucket; // capture before zeroing for sound tier
  pixelBucket = 0;
  regenSecsLeft = REGEN_INTERVAL;
  updateBucketHUD();

  // Flash effect
  const flash = document.getElementById("bomb-flash");
  flash.classList.add("bang");
  sfxBomb(pixelsForSound);
  showBombToast(currentIdx, mapX, mapY);
  setTimeout(()=>flash.classList.remove("bang"), 300);

  // Collect all pixels within radius circle
  const r2 = radius*radius;
  const x0 = Math.max(0, mapX-radius), x1 = Math.min(MAP_W-1, mapX+radius);
  const y0 = Math.max(0, mapY-radius), y1 = Math.min(MAP_H-1, mapY+radius);

  const cleared = [];
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      if((x-mapX)**2+(y-mapY)**2 > r2) continue;
      const i=y*MAP_W+x;
      if(!landMask[i]) continue;
      const prev=claimByPixel[i];
      if(prev<0) continue; // already unclaimed
      // Unclaim this pixel
      claimerCount[prev]=Math.max(0,(claimerCount[prev]||1)-1);
      const geo=featByPixel[i];
      if(geo>=0&&geoClaimCnt[geo]&&geoClaimCnt[geo][prev]){
        geoClaimCnt[geo][prev]=Math.max(0,(geoClaimCnt[geo][prev]||1)-1);
        checkConquestReversal(geo,prev);
      }
      claimByPixel[i]=-1;
      totalClaimed=Math.max(0,totalClaimed-1);
      cleared.push(i);
    }
  }

  if(cleared.length===0){scheduleLegend();return;}

  // Batch erase from claim canvas
  let bx0=MAP_W,by0=MAP_H,bx1=0,by1=0;
  for(const i of cleared){
    const x=i%MAP_W,y=(i/MAP_W)|0;
    if(x<bx0)bx0=x;if(x>bx1)bx1=x;
    if(y<by0)by0=y;if(y>by1)by1=y;
  }
  const bw=bx1-bx0+1,bh=by1-by0+1;
  const img=claimCtx.getImageData(bx0,by0,bw,bh);
  const d=img.data;
  for(const i of cleared){
    const x=(i%MAP_W)-bx0,y=((i/MAP_W)|0)-by0;
    const p=(y*bw+x)*4;
    d[p]=0;d[p+1]=0;d[p+2]=0;d[p+3]=0; // transparent
  }
  claimCtx.putImageData(img,bx0,by0);

  $("px-count").textContent=totalClaimed.toLocaleString();
  scheduleLegend();

  // Exit bomb mode after detonation
  bombMode=false;
  $("btn-bomb").classList.remove("active");
  vp.style.cursor="crosshair";
}


// ── Ocean wave animation ──────────────────────────────────────────
// Waves are small pixel-art arcs drawn on c-waves canvas.
// Each wave is a short horizontal "~" shape (3–5 pixels wide).
// Waves cycle through opacity (fade in → hold → fade out) at different phases.
// They only appear over ocean pixels (landMask[i]===0).
// Uses a seeded set of positions so waves are stable and randomly distributed.

const WAVE_COUNT   = 2800;   // total wave instances across the map
const WAVE_COLOUR  = [168, 223, 255]; // #a8dfff
let   waveReady    = false;
let   waveFrameAlt = 0;  // counts wave ticks; drives 1-second frame alternation

// Each wave: {x, y, phase, speed, len}
let waves = [];

function initWaves(){
  // Seeded random using a simple LCG so positions are deterministic
  let seed = 0x12345678;
  function rand(){ seed=(seed*1664525+1013904223)&0xFFFFFFFF; return (seed>>>0)/0xFFFFFFFF; }

  waves = [];
  const attempts = WAVE_COUNT * 6;
  for(let attempt=0; attempt<attempts && waves.length<WAVE_COUNT; attempt++){
    const x = Math.floor(rand() * (MAP_W - 6)) + 3;
    const y = Math.floor(rand() * MAP_H);
    const i = y * MAP_W + x;
    // Only place waves over ocean pixels
    if(landMask && landMask[i]===0){
      waves.push({
        x, y,
        phase: rand() * Math.PI * 2,        // random start phase
        speed: 0.003 + rand() * 0.004,      // cycle speed
        len:   2 + Math.floor(rand() * 3),  // 2–4 px wide
        t:     0,
      });
    }
  }
  console.log("Waves initialised:", waves.length);
  waveReady = true;
}

let waveFrame = 0;
let waveAnimId = null;
let waveBaseImg = null;    // cached full ocean ImageData (built once)
let waveWorkImg = null;    // working copy we modify each frame
let prevWavePixels = [];   // pixels drawn last frame (to restore)

function buildWaveBase(){
  // Build the static ocean base image once after map loads
  waveBaseImg = wctx.createImageData(MAP_W, MAP_H);
  const d = waveBaseImg.data;
  for(let i=0;i<MAP_PX;i++){
    if(landMask[i]===0){
      const p=i*4;
      const bx=i%MAP_W, by=(i/MAP_W)|0;
      const blon=(bx/MAP_W)*360-180;
      const blat=90-(by/MAP_H)*180;
      const [or2,og2,ob2]=oceanColour(blat,blon);
      d[p]=or2; d[p+1]=og2; d[p+2]=ob2; d[p+3]=255;
    }
    // Land stays transparent (bctx base canvas shows through)
  }
  waveWorkImg = new ImageData(new Uint8ClampedArray(waveBaseImg.data), MAP_W, MAP_H);
  wctx.putImageData(waveBaseImg, 0, 0);
}

function tickWaves(){
  if(!waveReady || !landMask){ waveAnimId=requestAnimationFrame(tickWaves); return; }
  waveFrame++;
  // ~10fps for waves
  if(waveFrame % 6 !== 0){ waveAnimId=requestAnimationFrame(tickWaves); return; }

  if(!waveBaseImg) buildWaveBase();

  // Alternate frame shape every 10 wave-ticks (~1 second at 10fps)
  waveFrameAlt++;
  const frameB = Math.floor(waveFrameAlt / 10) % 2 === 1;

  const d = waveWorkImg.data;
  const bd = waveBaseImg.data;
  const [wr, wg, wb] = WAVE_COLOUR;         // #a8dfff
  // Ocean base colour per-pixel from waveBaseImg (zone-tinted ocean)
  const _bd = waveBaseImg.data;

  // Restore previous wave pixels
  for(const p of prevWavePixels){
    d[p]=bd[p]; d[p+1]=bd[p+1]; d[p+2]=bd[p+2]; d[p+3]=bd[p+3];
  }
  prevWavePixels = [];

  for(const w of waves){
    w.t += w.speed;
    const raw = Math.sin(w.t + w.phase);
    const alpha = raw > 0.3 ? Math.pow((raw-0.3)/0.7, 1.5) * 0.7 : 0;
    if(alpha < 0.02) continue;
    const t = alpha;
    for(let dx=0; dx<w.len*2; dx++){
      const sinVal = Math.sin((dx/(w.len*2))*Math.PI*2);
      // Frame A: crest up (dy=0 at top of arc)
      // Frame B: crest down (inverted — dy=1 at top of arc)
      const dy = frameB ? (sinVal > 0 ? 1 : 0) : (sinVal > 0 ? 0 : 1);
      const px=w.x+dx, py=w.y+dy;
      if(px<0||px>=MAP_W||py<0||py>=MAP_H) continue;
      if(landMask[py*MAP_W+px]!==0) continue;
      const p=(py*MAP_W+px)*4;
      d[p]  =Math.round(_bd[p]*(1-t)   + wr*t);
      d[p+1]=Math.round(_bd[p+1]*(1-t) + wg*t);
      d[p+2]=Math.round(_bd[p+2]*(1-t) + wb*t);
      d[p+3]=255;
      prevWavePixels.push(p);
    }
  }

  wctx.putImageData(waveWorkImg, 0, 0);
  waveAnimId = requestAnimationFrame(tickWaves);
}


// ── Rebuild country selector — disable conquered countries ────────
function refreshCsel(){
  const csel=$("csel"); if(!csel) return;
  for(const opt of csel.options){
    const idx=+opt.value;
    // A country is "conquered by someone else" if conqueredSet has any key
    // "idx:X" where X !== idx (someone else owns it)
    // OR "idx:idx" meaning the country conquered itself (flood fill debug etc)
    // The rule: disable if ANY player has conquered this geo country
    const isConquered=[...conqueredSet].some(k=>k.startsWith(idx+':'));
    opt.disabled=isConquered;
    opt.style.color=isConquered?'#334155':'';
    opt.style.background=isConquered?'#0a0f1a':'';
  }
  // If currentIdx is now disabled, switch to first available
  const currentOpt=csel.querySelector('option[value="'+currentIdx+'"]');
  if(currentOpt&&currentOpt.disabled){
    const first=csel.querySelector('option:not([disabled])');
    if(first){
      currentIdx=+first.value;
      csel.value=currentIdx;
      $("swatch").style.background=featList[currentIdx].color;
    }
  }
}

function showBombToast(attackerIdx, mapX, mapY){
  // Find the geo country at the bomb's centre pixel
  const i = mapY * MAP_W + mapX;
  const geoIdx = (i>=0 && i<MAP_PX) ? featByPixel[i] : -1;
  const attacker = featList[attackerIdx];
  if(!attacker) return;

  let target = 'open ocean';
  if(geoIdx >= 0 && featList[geoIdx]) target = featList[geoIdx].name;

  $("bomb-toast-body").innerHTML =
    "<span style='color:"+attacker.color+";font-weight:600'>"+attacker.name+"</span>"
    +" is bombing <b style='color:#fef2f2'>"+target+"</b>!";

  const t=$("bomb-toast");
  t.style.display="block";
  t.style.animation="none";
  requestAnimationFrame(()=>{ t.style.animation=""; });
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.display="none", 3000);
}

// ── Input events ─────────────────────────────────────────────────
vp.addEventListener("mousedown",e=>{
  if(e.button===1||e.altKey||e.button===2){isDragging=true;dragBase={x:e.clientX-ox,y:e.clientY-oy};vp.style.cursor="grab";return;}
  if(bombMode){
    const p=screenToMap(e.clientX,e.clientY);
    detonateBomb(p.x,p.y);
    return;
  }
  isPainting=true;const p=screenToMap(e.clientX,e.clientY);paintBrush(p.x,p.y);
});
vp.addEventListener("mousemove",e=>{
  if(isDragging){ox=e.clientX-dragBase.x;oy=e.clientY-dragBase.y;clamp();applyT();return;}
  // Bomb preview circle
  if(bombMode){
    const p2=screenToMap(e.clientX,e.clientY);
    ovCtx.clearRect(0,0,MAP_W,MAP_H);
    const r=Math.floor(Math.sqrt(pixelBucket));
    if(r>=1){
      ovCtx.strokeStyle="rgba(239,68,68,0.85)";
      ovCtx.lineWidth=1;
      ovCtx.beginPath();
      ovCtx.arc(p2.x,p2.y,r,0,Math.PI*2);
      ovCtx.stroke();
      // Fill preview area semi-transparent
      ovCtx.fillStyle="rgba(239,68,68,0.12)";
      ovCtx.beginPath();
      ovCtx.arc(p2.x,p2.y,r,0,Math.PI*2);
      ovCtx.fill();
    }
  } else {
    ovCtx.clearRect(0,0,MAP_W,MAP_H);
  }
  if(isPainting){const p=screenToMap(e.clientX,e.clientY);paintBrush(p.x,p.y);}
  if(!landMask)return;
  const p=screenToMap(e.clientX,e.clientY),vr=vp.getBoundingClientRect(),tip=$("tip");
  if(p.x>=0&&p.x<MAP_W&&p.y>=0&&p.y<MAP_H){
    const i=p.y*MAP_W+p.x;
    tip.style.display="block";tip.style.left=(e.clientX-vr.left+14)+"px";tip.style.top=(e.clientY-vr.top-40)+"px";
    const gi=featByPixel[i],ci=claimByPixel[i];
    if(landMask[i]){
      // ── Geographic country name (what country this pixel belongs to) ──
      const geoName = gi>=0 ? featList[gi].name : "Unclaimed Territory";
      $("tip-name").textContent = geoName;

      const sub=$("tip-sub");
      let html2="";

      // ── This specific pixel: who claimed it ──────────────────────────
      if(ci>=0 && featList[ci]){
        html2+="<span style='color:#94a3b8;font-size:9px;text-transform:uppercase;letter-spacing:.07em'>This pixel</span><br>"
          +"<span style='color:"+featList[ci].color+";font-weight:600'>&#9632; "+featList[ci].name+"</span><br>"
          +"<span style='color:#334155;font-size:9px'>───────────────</span><br>";
      } else if(landMask[i] && ci<0){
        html2+="<span style='color:#475569;font-size:10px'>&#9634; Unclaimed pixel</span><br>"
          +"<span style='color:#334155;font-size:9px'>───────────────</span><br>";
      }

      if(gi>=0){
        const total=geoTotal[gi]||1;
        const gc=geoClaimCnt[gi]||{};
        const claimers=Object.entries(gc).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]);

        // Conquest status
        const conqueredBy = [...conqueredSet].find(k=>k.startsWith(gi+":"));
        if(conqueredBy){
          const conquerer=featList[+conqueredBy.split(":")[1]];
          if(conquerer){
            html2+="<span style='color:"+conquerer.color+";font-weight:600'>&#9873; Conquered by "+conquerer.name+"</span><br>";
          }
        }

        // Coverage bar + claimer breakdown
        if(claimers.length===0){
          const unclaimedPct=100;
          html2+="<span style='color:#475569'>No pixels claimed yet</span>";
        } else {
          // Total claimed %
          const totalClaimed2=claimers.reduce((s,[,n])=>s+n,0);
          const covPct=Math.round(totalClaimed2/total*100);
          html2+="<span style='color:#64748b'>Coverage: "+covPct+"%</span><br>";
          for(const [idx,count] of claimers.slice(0,3)){
            const pct=Math.round(count/total*100);
            const f=featList[+idx]; if(!f) continue;
            html2+="<span style='color:"+f.color+"'>"+f.name+"</span>"
              +"<span style='color:#64748b'> "+pct+"%</span><br>";
          }
          if(claimers.length>3){
            html2+="<span style='color:#334155'>+"+( claimers.length-3)+" more</span>";
          }
        }
      } else {
        html2="<span style='color:#475569'>No country data</span>";
      }

      sub.innerHTML=html2;
    }else{
      $("tip-name").textContent="Ocean";
      $("tip-sub").innerHTML="";
    }
  }else{tip.style.display="none";}
});

// Touch
let lastDist=null;
vp.addEventListener("touchstart",e=>{
  if(e.touches.length===1){isPainting=true;const t=e.touches[0],p=screenToMap(t.clientX,t.clientY);paintBrush(p.x,p.y);}
  if(e.touches.length===2){isPainting=false;lastDist=tdist(e);}e.preventDefault();
},{passive:false});

  if(e.touches.length===1&&isPainting){const t=e.touches[0],p=screenToMap(t.clientX,t.clientY);paintBrush(p.x,p.y);}
  if(e.touches.length===2){const d=tdist(e);if(lastDist){const r=vp.getBoundingClientRect();doZoom(d/lastDist,((e.touches[0].clientX+e.touches[1].clientX)/2)-r.left,((e.touches[0].clientY+e.touches[1].clientY)/2)-r.top);}lastDist=d;}
  e.preventDefault();
},{passive:false});
vp.addEventListener("touchend",()=>{if(isPainting)setTimeout(runAutoFill,0);isPainting=false;lastDist=null;});
function tdist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}

// ── Procedural fallback ───────────────────────────────────────────
async function proceduralFallback(){
  featList=[{id:"0",name:"Uncharted World",color:"#3b82f6",geometry:null}];
  featByPixel=new Int16Array(MAP_PX).fill(0);claimByPixel=new Int16Array(MAP_PX).fill(-1);landMask=new Uint8Array(MAP_PX);
  const pm=mkPerm(),noise=mkNoise(pm),img=bctx.createImageData(MAP_W,MAP_H),d=img.data;
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const nx=x/MAP_W-.5,ny=y/MAP_H-.5;
      let v=noise(nx*4,ny*4)*.6+noise(nx*8,ny*8)*.3+noise(nx*16,ny*16)*.1;v-=Math.abs(ny)*2.5*.35;
      const i=y*MAP_W+x,p=i*4;
      if(v>.04){landMask[i]=1;geoTotal[0]=(geoTotal[0]||0)+1;d[p]=44;d[p+1]=60;d[p+2]=44;}
      else{featByPixel[i]=-1;d[p]=10;d[p+1]=18;d[p+2]=44;}d[p+3]=255;
    }
    if(y%256===0){prog(10+Math.floor(y/MAP_H*86),"Generating procedural map…");await sleep(1);}
  }
  bctx.putImageData(img,0,0);
  const csel=$("csel");csel.innerHTML="";
  const o=document.createElement("option");o.value=0;o.textContent="Uncharted World";csel.appendChild(o);
  $("swatch").style.background="#3b82f6";
  prog(100,"Ready (offline mode)");await sleep(80);$("loading").style.display="none";resetView();
}
function mkPerm(){const p=Array.from({length:256},(_,i)=>i);for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}return[...p,...p];}
function mkNoise(pm){
  const fd=t=>t*t*t*(t*(t*6-15)+10),lp=(a,b,t)=>a+t*(b-a),gr=(h,x,y)=>{switch(h&3){case 0:return x+y;case 1:return -x+y;case 2:return x-y;default:return -x-y;}};
  return(x,y)=>{const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fd(x),v=fd(y),a=pm[X]+Y,b=pm[X+1]+Y;return lp(lp(gr(pm[a],x,y),gr(pm[b],x-1,y),u),lp(gr(pm[a+1],x,y-1),gr(pm[b+1],x-1,y-1),u),v);};
}

(async()=>{
  prog(3,"Initialising…");
  try{
    await boot();
  }catch(e){
    console.error("boot() failed:",e);
    showErr("Map load failed: "+e.message+"\n\nFalling back to procedural map…");
    await sleep(2000);
    $("err-box").style.display="none";$("prog-bar").style.display="block";$("retry-btn").style.display="none";
    await proceduralFallback();
  }
})();
