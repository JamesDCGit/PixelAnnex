}

// ── Track 2: Epic / Classical ────────────────────────────────────
// Slow, orchestral feel: strings (sawtooth+vibrato), brass (square),
// choir pad (sine), deep bass. 4/4 at ~72bpm. ~60s loop.
function scheduleMusicTrack2(ctx, masterGain, startT){
  const B = 0.415; // beat at 72bpm

  // Minor scale in D: D E F G A Bb C D
  const N = {
    D2:73.4, A2:110.0, D3:146.8, F3:174.6, G3:196.0, A3:220.0, Bb3:233.1, C4:261.6,
    D4:293.7, E4:329.6, F4:349.2, G4:392.0, A4:440.0, Bb4:466.2, C5:523.3, D5:587.3,
    F5:698.5,
  };

  // Helper: vibrato oscillator (simulate string vibrato via slow FM)
  function strNote(f, t, dur, vol){
    try{
      const osc  = ctx.createOscillator();
      const vib  = ctx.createOscillator(); // vibrato LFO
      const vibG = ctx.createGain();
      const gain = ctx.createGain();
      osc.type  = 'sawtooth';
      vib.type  = 'sine';
      vib.frequency.value = 5.5; // vibrato rate Hz
      vibG.gain.value = f * 0.015; // vibrato depth (1.5% of pitch)
      vib.connect(vibG); vibG.connect(osc.frequency);
      osc.frequency.setValueAtTime(f, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.08);
      gain.gain.setValueAtTime(vol, t + dur - 0.1);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t); osc.stop(t+dur+0.05);
      vib.start(t); vib.stop(t+dur+0.05);
    }catch(e){}
  }

  // Helper: choir/pad (sine, slow attack)
  function padNote(f, t, dur, vol){
    try{
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.4);
      gain.gain.setValueAtTime(vol, t + dur - 0.4);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t); osc.stop(t+dur+0.1);
    }catch(e){}
  }

  // Helper: brass stab (square, medium attack)
  function brassNote(f, t, dur, vol){
    try{
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.06);
      gain.gain.exponentialRampToValueAtTime(vol*0.5, t + dur - 0.05);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t); osc.stop(t+dur+0.05);
    }catch(e){}
  }

  // ── Deep bass (16 bars × 4 beats) ───────────────────────────────
  const bassSeq = [
    N.D2,N.D2,N.D2,N.A2, N.G3,N.G3,N.G3,N.A2,
    N.A2,N.A2,N.A2,N.D2, N.Bb3,N.Bb3,N.A2,N.A2,
    N.D2,N.D2,N.F3,N.G3, N.A2,N.A2,N.G3,N.A2,
    N.D2,N.D2,N.D2,N.C4, N.D3,N.D3,N.D3,N.D3,
  ];
  bassSeq.forEach((f,i)=>{
    strNote(f, startT+i*B, B*0.92, 0.20);
  });

  // ── Chord pads (slow whole notes, choir feel) ────────────────
  // 4 chords × 4 beats each, repeated 4 times
  const chords = [
    [N.D3,N.F3,N.A3], [N.G3,N.Bb3,N.D4], [N.A3,N.C4,N.E4||N.D4], [N.Bb3,N.D4,N.F4],
  ];
  for(let rep=0;rep<4;rep++){
    chords.forEach((ch,ci)=>{
      ch.forEach(f=>{
        padNote(f, startT+(rep*16+ci*4)*B, 4*B*0.95, 0.10);
      });
    });
  }

  // ── Melody (strings, lyrical) ────────────────────────────────
  const mel = [
    // phrase 1 (8 beats)
    [N.D4,4],[N.F4,2],[N.G4,2],
    [N.A4,3],[N.G4,1],[N.F4,2],[N.E4||N.D4,2],
    // phrase 2
    [N.D4,2],[N.F4,2],[N.A4,2],[N.Bb4,2],
    [N.A4,4],[N.G4,4],
    // phrase 3
    [N.F4,2],[N.G4,2],[N.A4,2],[N.C5,2],
    [N.D5,4],[N.C5,2],[N.A4,2],
    // phrase 4 (resolution)
    [N.Bb4,2],[N.A4,2],[N.G4,2],[N.F4,2],
    [N.D4,8],
  ];
  let mT=startT;
  for(let rep=0;rep<2;rep++){
    let rT=startT+rep*32*B;
    for(const [f,beats] of mel){
      strNote(f, rT, beats*B*0.9, 0.14);
      rT+=beats*B;
    }
  }

  // ── Brass accents (on downbeats of each 4-bar phrase) ──────────
  const brassRhythm=[0,8,16,24,32,40,48,56];
  const brassPitch =[N.D4,N.G4,N.A4,N.Bb4,N.D4,N.F4,N.A4,N.D4];
  brassRhythm.forEach((b,i)=>{
    brassNote(brassPitch[i], startT+b*B, 1.5*B, 0.10);
  });
}

let _currentTrack = 1;
const _trackFns = { 1: scheduleMusicTrack, 2: scheduleMusicTrack2, 3: scheduleMusicTrack3 };

function selectTrack(n){

// ── Track 3: Military / Epic ─────────────────────────────────────
// Heavy percussion, deep brass ostinato, driving 4/4 at ~92bpm.
// Inspired by action-movie scores: low brass + war drums + rising strings.
function scheduleMusicTrack3(ctx, masterGain, startT){
  const B = 0.652; // beat at 92bpm

  // Pitches — Dm / military feel (D, F, G, A, C, Bb)
  const N={
    D1:36.7, A1:55.0, D2:73.4, F2:87.3, G2:98.0, A2:110.0, Bb2:116.5, C3:130.8,
    D3:146.8, F3:174.6, G3:196.0, A3:220.0, Bb3:233.1, C4:261.6,
    D4:293.7, F4:349.2, G4:392.0, A4:440.0,
  };

  // ── Deep sub-bass (sine, very low, half notes) ───────────────
  function subBass(f,t,dur,vol){
    try{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.04);
      g.gain.setValueAtTime(vol,t+dur-0.08);
      g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t+dur+0.05);
    }catch(e){}
  }

  // ── Brass (sawtooth, hard attack) ────────────────────────────
  function brass(f,t,dur,vol){
    try{
      const o=ctx.createOscillator(), g=ctx.createGain();
      const filt=ctx.createBiquadFilter();
      filt.type='lowpass'; filt.frequency.value=1200;
      o.type='sawtooth'; o.frequency.value=f;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.03);
      g.gain.exponentialRampToValueAtTime(vol*0.6,t+dur-0.05);
      g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(filt); filt.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t+dur+0.05);
    }catch(e){}
  }

  // ── War drum (pitched noise burst) ──────────────────────────
  function drum(t, vol, isKick){
    try{
      const bufLen=Math.floor(ctx.sampleRate*(isKick?0.18:0.06));
      const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
      const bd=buf.getChannelData(0);
      for(let i=0;i<bufLen;i++) bd[i]=(Math.random()*2-1);
      const src=ctx.createBufferSource();
      src.buffer=buf;
      const g=ctx.createGain();
      const filt=ctx.createBiquadFilter();
      filt.type=isKick?'lowpass':'bandpass';
      filt.frequency.value=isKick?180:800;
      g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+(isKick?0.16:0.05));
      src.connect(filt); filt.connect(g); g.connect(masterGain);
      src.start(t); src.stop(t+0.25);
    }catch(e){}
  }

  // ── Ostinato brass riff (repeating 4-beat motif × 16) ───────
  // Classic military "da-da-DUM" feel
  const riff=[
    [N.D3,0,0.4],[N.D3,0.5,0.4],[N.A3,1,0.6],[N.G3,1.5,0.3],
    [N.F3,2,0.4],[N.D3,2.5,0.3],[N.A3,3,0.8],
  ];
  for(let bar=0;bar<16;bar++){
    riff.forEach(([f,off,dur])=>{
      brass(f, startT+bar*4*B+off*B, dur*B, 0.18);
    });
  }

  // ── Counter-melody (high brass, enters bar 4) ────────────────
  const counter=[
    [N.F4,0,2],[N.G4,2,1],[N.A4,3,1],
    [N.Bb3,0,2],[N.A3,2,2],
    [N.G4,0,1],[N.F4,1,1],[N.D4,2,2],
    [N.A3,0,4],
  ];
  for(let rep=0;rep<2;rep++){
    let cT=startT+(4+rep*8)*4*B;
    for(const [f,off,dur] of counter){
      brass(f, cT+off*B, dur*B*0.88, 0.12);
    }
    cT+=4*4*B;
    for(const [f,off,dur] of counter){
      brass(f, cT+off*B, dur*B*0.88, 0.12);
    }
  }

  // ── Sub-bass line ────────────────────────────────────────────
  const bassSeq=[
    N.D2,N.D2,N.A1,N.A1, N.G2,N.G2,N.D2,N.D2,
    N.A1,N.A1,N.Bb2,N.Bb2, N.C3,N.C3,N.A1,N.A1,
  ];
  for(let rep=0;rep<4;rep++){
    bassSeq.forEach((f,i)=>{
      subBass(f,startT+(rep*16+i)*2*B,1.8*B,0.22);
    });
  }

  // ── War drums: kick on 1&3, snare on 2&4, rolls on bar 4 ────
  const bars=64;
  for(let beat=0;beat<bars*4;beat++){
    const t=startT+beat*B;
    const b=beat%4;
    if(b===0||b===2) drum(t,0.28,true);   // kick
    if(b===1||b===3) drum(t,0.18,false);  // snare
    // 16th-note hi-hat
    for(let s=0;s<4;s++){
      try{
        const bufLen=Math.floor(ctx.sampleRate*0.025);
        const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
        const bd=buf.getChannelData(0);
        for(let i=0;i<bufLen;i++) bd[i]=(Math.random()*2-1)*0.4;
        const src=ctx.createBufferSource(); src.buffer=buf;
        const hg=ctx.createGain();
        hg.gain.value=s===0?0.06:0.03;
        src.connect(hg); hg.connect(masterGain);
        src.start(t+s*B*0.25); src.stop(t+s*B*0.25+0.04);
      }catch(e){}
    }
  }
}

// ── Player pixel outline ──────────────────────────────────────────
// Draws a 1px white outline around all pixels belonging to currentIdx.
// Only redrawn when pixels change (throttled via rAF + dirty flag).
let _outlineDirty = false;
let _outlineScheduled = false;

function markOutlineDirty(){
  _outlineDirty = true;
  if(!_outlineScheduled){
    _outlineScheduled = true;
    requestAnimationFrame(flushOutline);
  }
}

function flushOutline(){
  _outlineScheduled = false;
  if(!_outlineDirty) return;
  _outlineDirty = false;
  redrawOutline();
}

function redrawOutline(){
  if(!claimByPixel || !landMask) return;
  const img = outlineCtx.createImageData(MAP_W, MAP_H);
  const d   = img.data;
  const DX=[-1,1,0,0], DY=[0,0,-1,1];
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const i=y*MAP_W+x;
      if(claimByPixel[i]!==currentIdx) continue;
      // Check 4 neighbours — if any is NOT currentIdx, draw white there
      for(let d4=0;d4<4;d4++){
        const nx=x+DX[d4], ny=y+DY[d4];
        if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
        const ni=ny*MAP_W+nx;
        if(claimByPixel[ni]===currentIdx) continue;
        // Draw white outline pixel at neighbour position
        const p=ni*4;
        d[p]=255; d[p+1]=255; d[p+2]=255; d[p+3]=180;
      }
    }
  }
  outlineCtx.putImageData(img, 0, 0);
}

// ── Multiplayer client ────────────────────────────────────────────
// Connects to WebSocket server if running. Falls back to single-player silently.
let ws = null;
let wsReady = false;
let _localPlayerId = null;

const WS_URL = (() => {
  // Auto-detect: same host, port 3000, or override via ?server=ws://...
  const params = new URLSearchParams(window.location.search);
  if (params.get('server')) return params.get('server');
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.hostname + ':3000';
})();

function mpConnect() {
  try {
    ws = new WebSocket(WS_URL);
  } catch(e) {
    console.log('[MP] WebSocket not available, running single-player');
    return;
  }

  ws.addEventListener('open', () => {
    console.log('[MP] Connected to', WS_URL);
    wsReady = true;
    updateServerStatus(true, 0, []);
    mpSendJoin();
  });

  ws.addEventListener('close', () => {
    wsReady = false;
    console.log('[MP] Disconnected — reconnecting in 3s');
    updateServerStatus(false, 0, []);
    setTimeout(mpConnect, 3000);
  });

  ws.addEventListener('error', () => {
    // Silent fail — server may not be running
  });

  ws.addEventListener('message', e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    mpHandleMessage(msg);
  });
}

function mpSendJoin() {
  if (!wsReady) return;
  // Retry if map not loaded yet
  if (!featList.length || !landMask || !Object.keys(geoTotal).length) {
    setTimeout(mpSendJoin, 500);
    return;
  }
  const f = featList[currentIdx];
  if (!f) return;

  // Build compressed geoAtPixel runs (send once to bootstrap server)
  const geoPixelRuns = [];
  let rs = -1, rg = -99;
  for (let i = 0; i <= MAP_PX; i++) {
    const g = i < MAP_PX ? featByPixel[i] : -999;
    if (g !== rg) {
      if (rg >= 0 && rs >= 0) geoPixelRuns.push({ s: rs, l: i - rs, g: rg });
      rs = i; rg = g;
    }
  }

  // Compress landMask runs
  const landRuns = [];
  let ls = -1, lv = -1;
  for (let i = 0; i <= MAP_PX; i++) {
    const v = i < MAP_PX ? (landMask[i] ? 1 : 0) : -1;
    if (v !== lv) {
      if (lv === 1 && ls >= 0) landRuns.push({ s: ls, l: i - ls });
      ls = i; lv = v;
    }
  }

  ws.send(JSON.stringify({
    type: 'join',
    countryId: f.id,
    geoTotal: Object.fromEntries(Object.entries(geoTotal)),
    geoPixelRuns,
    landRuns,
  }));
}

function mpHandleMessage(msg) {
  switch (msg.type) {

    case 'welcome': {
      _localPlayerId = msg.playerId;
      console.log('[MP] Welcome, player', _localPlayerId);
      // Apply server state — overlay server's pixel ownership on our map
      if (msg.state?.runs) {
        for (const { s, l, o } of msg.state.runs) {
          // Find featList index for country id o
          const fi = featList.findIndex(f => f.id === String(o));
          if (fi < 0) continue;
          const [r,g,b] = hexRgb(featList[fi].color);
          const imgData = claimCtx.createImageData(1,1);
          imgData.data[0]=r; imgData.data[1]=g; imgData.data[2]=b; imgData.data[3]=215;
          for (let i = s; i < s + l; i++) {
            const x = i % MAP_W, y = (i / MAP_W) | 0;
            claimByPixel[i] = fi;
            claimCtx.putImageData(imgData, x, y);
          }
        }
        // Batch redraw via full image rebuild for performance
        mpRebuildClaimCanvas();
      }
      if (msg.state?.conquered) {
        for (const key of msg.state.conquered) conqueredSet.add(key);
      }
      scheduleLegend();
      break;
    }

    case 'delta': {
      if (!msg.pixels?.length) return;
      // Group by owner for batch putImageData
      const byOwner = {};
      for (const { x, y, owner } of msg.pixels) {
        if (owner === null) {
          // Cleared pixel
          const i = y * MAP_W + x;
          claimByPixel[i] = -1;
          claimCtx.clearRect(x, y, 1, 1);
          continue;
        }
        const fi = featList.findIndex(f => f.id === String(owner));
        if (fi < 0) continue;
        const i = y * MAP_W + x;
        if (claimByPixel[i] === fi) continue; // already correct
        claimByPixel[i] = fi;
        (byOwner[fi] ??= []).push({ x, y });
      }
      // Paint batched pixels
      for (const [fi, pixels] of Object.entries(byOwner)) {
        const [r,g,b] = hexRgb(featList[+fi].color);
        for (const { x, y } of pixels) {
          const id = claimCtx.createImageData(1,1);
          id.data[0]=r; id.data[1]=g; id.data[2]=b; id.data[3]=215;
          claimCtx.putImageData(id, x, y);
        }
      }
      markOutlineDirty();
      scheduleLegend();
      break;
    }

    case 'conquest': {
      const { geoIdx, countryId } = msg;
      conqueredSet.add(geoIdx + ':' + countryId);
      const fi = featList.findIndex(f => f.id === String(countryId));
      if (fi >= 0) {
        showConquestToast(geoIdx, fi);
        placeFlag(geoIdx, fi);
      }
      scheduleLegend();
      break;
    }

    case 'reversal': {
      const { geoIdx, countryId } = msg;
      conqueredSet.delete(geoIdx + ':' + countryId);
      eraseFlag(geoIdx);
      scheduleLegend();
      break;
    }

    case 'players': {
      const humans = msg.list.filter(p=>!p.isBot);
      const bots   = msg.list.filter(p=>p.isBot);
      console.log('[MP] Players:', humans.length, 'humans,', bots.length, 'bots');
      // Update player count per country
      Object.keys(_playerCountByCountry).forEach(k => delete _playerCountByCountry[k]);
      for(const p of msg.list){
        const id = String(p.countryId);
        _playerCountByCountry[id] = (_playerCountByCountry[id]||0) + 1;
      }
      updateServerStatus(true, humans.length, bots);
      renderCselList(document.getElementById('csel-search')?.value||'');
      break;
    }
  }
}

// Batch rebuild claim canvas from claimByPixel state
function mpRebuildClaimCanvas() {
  const img = claimCtx.createImageData(MAP_W, MAP_H);
  const d   = img.data;
  for (let i = 0; i < MAP_PX; i++) {
    const fi = claimByPixel[i];
    if (fi < 0 || !featList[fi]) continue;
    const [r,g,b] = hexRgb(featList[fi].color);
    const p = i*4;
    d[p]=r; d[p+1]=g; d[p+2]=b; d[p+3]=215;
  }
  claimCtx.putImageData(img, 0, 0);
}

// ── Bomb craters ─────────────────────────────────────────────────
// Each crater fades over CRATER_FADE_MS (10 s).
// Drawn on c-overlay using a radial gradient: dark centre → orange rim → transparent.
const CRATER_FADE_MS = 10000;  // 10 seconds
let craters = []; // [{x, y, r, born, type}]

function addCrater(x, y, r, type){
  craters.push({x, y, r, born:Date.now(), type});
  drawAllCraters();
}

function drawCrater(ctx, cx, cy, r, alpha, type){
  // Outer glow radius slightly larger than crater
  const R = r * 1.3;
  // Colour by bomb type
  const rimCol = type==='nuke'  ? `rgba(255,160,0,${alpha*0.45})`
               : type==='moab'  ? `rgba(255,100,0,${alpha*0.40})`
                                 : `rgba(255,80,0,${alpha*0.35})`;
  const charCol = `rgba(20,10,0,${alpha*0.375})`;

  const grad = ctx.createRadialGradient(cx,cy,0, cx,cy,R);
  grad.addColorStop(0,   charCol);
  grad.addColorStop(0.5, charCol);
  grad.addColorStop(0.75, rimCol);
  grad.addColorStop(1,   'rgba(0,0,0,0)');

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // ── Pixel-art icon centred on crater ──────────────────────────
  // Icon size scales with crater radius, capped for readability
  const px = 3; // fixed icon pixel size — small, independent of crater radius

  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.imageSmoothingEnabled = false;

  if(type === 'nuke'){
    // Mushroom cloud — 7 col × 8 row pixel art
    // 0=transparent 1=white/cream 2=orange
    const cols = ['rgba(0,0,0,0)','rgba(255,240,200,1)','rgba(255,140,0,1)'];
    const px2 = px * 0.85;
    const grid = [
      [0,1,1,1,1,1,0],  // cap top
      [1,2,2,2,2,2,1],  // cap mid
      [1,2,1,1,1,2,1],  // cap mid
      [0,1,2,2,2,1,0],  // cap bottom
      [0,0,1,1,1,0,0],  // stem top
      [0,0,1,1,1,0,0],  // stem
      [0,1,1,1,1,1,0],  // base
      [1,1,1,1,1,1,1],  // base bottom
    ];
    const ox = cx - grid[0].length/2*px2;
    const oy = cy - grid.length/2*px2;
    for(let row=0;row<grid.length;row++){
      for(let col=0;col<grid[row].length;col++){
        const c=grid[row][col]; if(!c) continue;
        ctx.fillStyle=cols[c];
        ctx.fillRect(ox+col*px2, oy+row*px2, px2, px2);
      }
    }
  } else if(type === 'moab'){
    // Missile — 3 col × 9 row (nose, body, fins)
    const c1='rgba(200,200,220,1)', c2='rgba(255,80,0,1)', c3='rgba(160,160,180,1)';
    const grid = [
      [0,1,0],  // nose tip
      [0,1,0],  // nose
      [1,1,1],  // shoulder
      [1,1,1],  // body
      [1,3,1],  // body mid (exhaust stripe)
      [1,3,1],
      [1,1,1],  // body
      [2,1,2],  // fins
      [2,0,2],  // fin tips
    ];
    const cols=['rgba(0,0,0,0)',c1,c2,c3];
    const ox = cx - grid[0].length/2*px;
    const oy = cy - grid.length/2*px;
    for(let row=0;row<grid.length;row++){
      for(let col=0;col<grid[row].length;col++){
        const c=grid[row][col]; if(!c) continue;
        ctx.fillStyle=cols[c];
        ctx.fillRect(ox+col*px, oy+row*px, px, px);
      }
    }
  } else {
    // Mortar bomb — round with fuse
    // 5 col × 6 row
    const c1='rgba(60,60,60,1)', c2='rgba(255,220,0,1)';
    const grid = [
      [0,0,2,0,0],  // fuse spark
      [0,0,2,0,0],  // fuse
      [0,1,1,1,0],  // bomb top
      [1,1,1,1,1],  // bomb mid
      [1,1,1,1,1],  // bomb mid
      [0,1,1,1,0],  // bomb bottom
    ];
    const cols=['rgba(0,0,0,0)',c1,c2];
    const ox = cx - grid[0].length/2*px;
    const oy = cy - grid.length/2*px;
    for(let row=0;row<grid.length;row++){
      for(let col=0;col<grid[row].length;col++){
        const c=grid[row][col]; if(!c) continue;
        ctx.fillStyle=cols[c];
        ctx.fillRect(ox+col*px, oy+row*px, px, px);
      }
    }
  }

  ctx.restore();
}

function drawAllCraters(){
  const now = Date.now();
  craters = craters.filter(c => now - c.born < CRATER_FADE_MS);
  craterCtx.clearRect(0,0,MAP_W,MAP_H);
  for(const c of craters){
    const age = (now - c.born) / CRATER_FADE_MS;
    const alpha = 1 - age;
    drawCrater(craterCtx, c.x, c.y, c.r, alpha, c.type);
  }
}

// Crater ticker — runs every ~3s (no need for per-frame updates)
let _craterTick = null;
function startCraterTicker(){
  if(_craterTick) return;
  function tick(){
    if(craters.length > 0) drawAllCraters();
    _craterTick = setTimeout(tick, 250);
  }
  tick();
}
// ── Ocean wave animation ──────────────────────────────────────────
// Waves are small pixel-art arcs drawn on c-waves canvas.
// Each wave is a short horizontal "~" shape (3–5 pixels wide).
// Waves cycle through opacity (fade in → hold → fade out) at different phases.
// They only appear over ocean pixels (landMask[i]===0).
// Uses a seeded set of positions so waves are stable and randomly distributed.

const WAVE_COUNT   = 2800;   // total wave instances across the map
const WAVE_COLOUR  = [176, 242, 255]; // intensified from #a8dfff
let   waveReady    = false;
let   waveFrameAlt = 0;  // counts wave ticks; drives 1-second frame alternation

// Each wave: {x, y, phase, speed, len}
let waves = [];

function initWaves(){
  // Seeded random using a simple LCG so positions are deterministic
  let seed = 0x12345678;
  function rand(){ seed=(seed*1664525+1013904223)&0xFFFFFFFF; return (seed>>>0)/0xFFFFFFFF; }

  waves = [];
  const attempts = WAVE_COUNT * 6;
  for(let attempt=0; attempt<attempts && waves.length<WAVE_COUNT; attempt++){
    const x = Math.floor(rand() * (MAP_W - 6)) + 3;
    const y = Math.floor(rand() * MAP_H);
    const i = y * MAP_W + x;
    // Only place waves over ocean pixels
    if(landMask && landMask[i]===0){
      waves.push({
        x, y,
        phase: rand() * Math.PI * 2,        // random start phase
        speed: 0.003 + rand() * 0.004,      // cycle speed
        len:   2 + Math.floor(rand() * 3),  // 2–4 px wide
        t:     0,
      });
    }
  }
  console.log("Waves initialised:", waves.length);
  waveReady = true;
}

let waveFrame = 0;
let waveAnimId = null;
let waveBaseImg = null;    // cached full ocean ImageData (built once)
let waveWorkImg = null;    // working copy we modify each frame
let prevWavePixels = [];   // pixels drawn last frame (to restore)

function buildWaveBase(){
  // Build the static ocean base image once after map loads
  waveBaseImg = wctx.createImageData(MAP_W, MAP_H);
  const d = waveBaseImg.data;
  for(let i=0;i<MAP_PX;i++){
    if(landMask[i]===0){
      const p=i*4;
      const bx=i%MAP_W, by=(i/MAP_W)|0;
      const blon=(bx/MAP_W)*360-180;
      const blat=90-(by/MAP_H)*180;
      const [or2,og2,ob2]=oceanColour(blat,blon);
      d[p]=or2; d[p+1]=og2; d[p+2]=ob2; d[p+3]=255;
    }
    // Land stays transparent (bctx base canvas shows through)
  }
  waveWorkImg = new ImageData(new Uint8ClampedArray(waveBaseImg.data), MAP_W, MAP_H);
  wctx.putImageData(waveBaseImg, 0, 0);
}

function tickWaves(){
  if(!waveReady || !landMask){ waveAnimId=requestAnimationFrame(tickWaves); return; }
  // Timestamp-based throttle: ~10fps (100ms between ticks)
  // Immune to tab-hidden frame debt — won't burst on resume
  const _wNow = performance.now();
  if(_wNow - _lastWaveTick < 100){ waveAnimId=requestAnimationFrame(tickWaves); return; }
  _lastWaveTick = _wNow;
  waveFrame++; // still used for waveFrameAlt alternation

  if(!waveBaseImg) buildWaveBase();

  // Alternate frame shape every 10 wave-ticks (~1 second at 10fps)
  waveFrameAlt++;
  const frameB = Math.floor(waveFrameAlt / 10) % 2 === 1;

  const d = waveWorkImg.data;
  const bd = waveBaseImg.data;
  const [wr, wg, wb] = WAVE_COLOUR;         // #a8dfff
  // Ocean base colour per-pixel from waveBaseImg (zone-tinted ocean)
  const _bd = waveBaseImg.data;

  // Restore previous wave pixels
  for(const p of prevWavePixels){
    d[p]=bd[p]; d[p+1]=bd[p+1]; d[p+2]=bd[p+2]; d[p+3]=bd[p+3];
  }
  prevWavePixels = [];

  for(const w of waves){
    w.t += w.speed;
    const raw = Math.sin(w.t + w.phase);
    const alpha = raw > 0.3 ? Math.pow((raw-0.3)/0.7, 1.5) * 0.7 : 0;
    if(alpha < 0.02) continue;
    const t = alpha;
    for(let dx=0; dx<w.len*2; dx++){
      const sinVal = Math.sin((dx/(w.len*2))*Math.PI*2);
      // Frame A: crest up (dy=0 at top of arc)
      // Frame B: crest down (inverted — dy=1 at top of arc)
      const dy = frameB ? (sinVal > 0 ? 1 : 0) : (sinVal > 0 ? 0 : 1);
      const px=w.x+dx, py=w.y+dy;
      if(px<0||px>=MAP_W||py<0||py>=MAP_H) continue;
      if(landMask[py*MAP_W+px]!==0) continue;
      const p=(py*MAP_W+px)*4;
      d[p]  =Math.round(_bd[p]*(1-t)   + wr*t);
      d[p+1]=Math.round(_bd[p+1]*(1-t) + wg*t);
      d[p+2]=Math.round(_bd[p+2]*(1-t) + wb*t);
      d[p+3]=255;
      prevWavePixels.push(p);
    }
  }

  wctx.putImageData(waveWorkImg, 0, 0);
  waveAnimId = requestAnimationFrame(tickWaves);
}

const SPRITE_COLOURS = {
  ship:   [[180,160,120], [220,200,160], [255,240,200]],
  plane:  [[200,210,220], [180,190,200], [240,245,250]],

// Glyph bounding box
function glyphBounds(glyph){
  let minX=999,maxX=0,minY=999,maxY=0;
  for(const [x,y] of glyph){
    if(x<minX)minX=x;if(x>maxX)maxX=x;
    if(y<minY)minY=y;if(y>maxY)maxY=y;
  }
  return {w:maxX+1,h:maxY+1};
}

// Sprite instances — created after map loads (need landMask for ocean check)
let spriteList = [];

function isOceanArea(mx,my,r=3){
  // Sample a few pixels around (mx,my) — true if mostly ocean
  let ocean=0,total=0;
  for(let dy=-r;dy<=r;dy+=2) for(let dx=-r;dx<=r;dx+=2){
    const i=(my+dy)*MAP_W+(mx+dx);
    if(i>=0&&i<MAP_PX){total++;if(landMask[i]===0)ocean++;}
  }
  return total===0||ocean/total>0.7;
}

function isLandArea(mx,my,r=3){
  return !isOceanArea(mx,my,r);
}

function initSprites(){
  spriteList=[];
  let seed=0xDEADBEEF;
  function rand(){seed=(seed*1664525+1013904223)>>>0;return seed/0xFFFFFFFF;}
  function randInt(n){return Math.floor(rand()*n);}

  // Spawn config: [type, count, zone]
  // zone: 'ocean'|'any'
  const config=[
    {type:'ship',   count:8,  zone:'ocean'},
    {type:'tanker', count:5,  zone:'ocean'},
    {type:'whale',  count:4,  zone:'ocean'},
    {type:'plane',  count:6,  zone:'any'},
    {type:'ufo',    count:3,  zone:'any'},
    {type:'rocket', count:2,  zone:'any'},
  ];

  for(const {type,count,zone} of config){
    const glyph=GLYPHS[type];
    const {w,h}=glyphBounds(glyph);
    let placed=0, attempts=0;
    while(placed<count && attempts<2000){
      attempts++;
      const mx=Math.floor(rand()*(MAP_W-w-4))+2;
      const my=Math.floor(rand()*(MAP_H-h-4))+2;
      const ok=zone==='ocean'?isOceanArea(mx,my):true;
      if(!ok) continue;

      // Direction — ships/tankers go E, planes go W, whales roam, UFOs/rockets random
      let vx=0,vy=0;
      if(type==='ship'||type==='tanker') {vx=0.4+rand()*0.3;vy=(rand()-0.5)*0.15;}
      else if(type==='whale')            {vx=(rand()-0.5)*0.4;vy=(rand()-0.5)*0.3;}
      else if(type==='plane')            {vx=-(0.8+rand()*0.5);vy=(rand()-0.5)*0.2;}
      else if(type==='ufo')              {vx=(rand()-0.5)*0.6;vy=(rand()-0.5)*0.4;}
      else if(type==='rocket')           {vx=(rand()-0.5)*0.3;vy=-(0.5+rand()*0.4);}

      spriteList.push({
        type, glyph, w, h,
        x:mx, y:my,
        vx, vy,
        px:mx, py:my,  // previous position
        flip: vx < 0,  // mirror for left-moving sprites
        colours: SPRITE_COLOURS[type],
        opacity: 0.7+rand()*0.3,
      });
      placed++;
    }
  }
  console.log('Sprites initialised:',spriteList.length);
}

// Draw one sprite glyph onto ImageData
function drawGlyph(imgData, mapW, s, erase){
  const {glyph,x,y,w,h,flip,colours,opacity} = s;
  const d=imgData.data;
  for(let pi=0;pi<glyph.length;pi++){
    let [gx,gy]=glyph[pi];
    if(flip) gx=w-1-gx;
    const px=Math.round(x+gx), py=Math.round(y+gy);
    if(px<0||px>=MAP_W||py<0||py>=MAP_H) continue;
    const idx=(py*MAP_W+px)*4;
    if(erase){
      // Restore to transparent (wave/ocean canvas shows through)
      d[idx]=0;d[idx+1]=0;d[idx+2]=0;d[idx+3]=0;
    } else {
      const col = pi < glyph.length*0.5 ? colours[0] : pi < glyph.length*0.8 ? colours[1] : colours[2];
      const a=Math.round(opacity*255);
      d[idx]=col[0];d[idx+1]=col[1];d[idx+2]=col[2];d[idx+3]=a;
    }
  }
}

let spriteFrame=0;
let spriteImg=null; // persistent ImageData for sprites canvas

function tickSprites(){
  if(!spriteList.length||!landMask){requestAnimationFrame(tickSprites);return;}
  // Timestamp-based throttle: ~8fps (125ms between ticks)
  const _sNow = performance.now();
  if(_sNow - _lastSpriteTick < 125){requestAnimationFrame(tickSprites);return;}
  _lastSpriteTick = _sNow;
  spriteFrame++;

  if(!spriteImg) spriteImg=sctx.createImageData(MAP_W,MAP_H);
  const d=spriteImg.data;

  for(const s of spriteList){
    // Erase at previous position
    drawGlyph(spriteImg,MAP_W,{...s,x:s.px,y:s.py},true);

    // Move
    s.px=s.x; s.py=s.y;
    s.x+=s.vx; s.y+=s.vy;

    // Wrap around map edges
    if(s.x>MAP_W+s.w) s.x=-s.w;
    if(s.x<-s.w) s.x=MAP_W;
    if(s.y>MAP_H+s.h) s.y=-s.h;
    if(s.y<-s.h) s.y=MAP_H;

    // Ships and tankers: stay on ocean — steer away from land
    if(s.type==='ship'||s.type==='tanker'||s.type==='whale'){
      const cx=Math.round(s.x+s.w/2), cy=Math.round(s.y+s.h/2);
      if(cx>=0&&cx<MAP_W&&cy>=0&&cy<MAP_H&&landMask[cy*MAP_W+cx]===1){
        s.vy = -s.vy + (Math.random()-0.5)*0.2;
        if(s.type!=='whale') s.vx=Math.abs(s.vx)*(s.flip?-1:1);
      }
    }

    // Draw at new position
    drawGlyph(spriteImg,MAP_W,s,false);
  }

  sctx.putImageData(spriteImg,0,0);
  requestAnimationFrame(tickSprites);
}

function drawLeaderPortrait(isoId){

let celebCanvas, celebCtx;
function getCelebCanvas(){
  if(celebCanvas) return celebCanvas;
  celebCanvas = document.createElement('canvas');
  celebCanvas.id = 'c-celeb';
  celebCanvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:200;';
  celebCanvas.width  = window.innerWidth;
  celebCanvas.height = window.innerHeight;

// ── Confetti particles ─────────────────────────────────────────────
const CONFETTI_COLOURS = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#06b6d4','#fff'];

function startCelebration(){
  getCelebCanvas();
  celebCtx.clearRect(0,0,celebCanvas.width,celebCanvas.height);
  
  const W = celebCanvas.width, H = celebCanvas.height;
  
  // Confetti particles
  const confetti = Array.from({length:220}, (_,i) => ({
    x: Math.random()*W, y: -20 - Math.random()*300,
    vx: (Math.random()-0.5)*4, vy: 2+Math.random()*4,
    rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.3,
    w: 6+Math.random()*8, h: 3+Math.random()*4,
    col: CONFETTI_COLOURS[i%CONFETTI_COLOURS.length],
    life: 1,
  }));

  // Firework bursts
  const fireworks = [];
  function spawnFirework(){
    const cx = W*0.2 + Math.random()*W*0.6;
    const cy = H*0.1 + Math.random()*H*0.5;
    const col = CONFETTI_COLOURS[Math.floor(Math.random()*CONFETTI_COLOURS.length)];
    const count = 40 + Math.floor(Math.random()*30);
    for(let i=0;i<count;i++){
      const angle = (i/count)*Math.PI*2;
      const speed = 2+Math.random()*5;
      fireworks.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
        col, life:1, trail:[]});
    }
  }
  // Initial bursts
  for(let i=0;i<5;i++) setTimeout(spawnFirework, i*300);
  // Ongoing bursts
  let burstInt = setInterval(spawnFirework, 600);

  let frame=0, animId;
  const MAX_FRAMES = 60*8; // 8 seconds

  function animate(){
    if(frame++ > MAX_FRAMES){ 
      clearInterval(burstInt);
      celebCtx.clearRect(0,0,W,H);
      return;
    }
    animId = requestAnimationFrame(animate);
    celebCtx.clearRect(0,0,W,H);

    // Draw confetti
    confetti.forEach(p => {
      if(p.y > H+20) { p.y=-20; p.x=Math.random()*W; p.vy=2+Math.random()*4; }
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.08;
      celebCtx.save();
      celebCtx.translate(p.x, p.y);
      celebCtx.rotate(p.rot);
      celebCtx.fillStyle = p.col;
      celebCtx.globalAlpha = Math.min(1, (MAX_FRAMES-frame)/60);
      celebCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      celebCtx.restore();
    });

    // Draw fireworks
    for(let i=fireworks.length-1;i>=0;i--){
      const f=fireworks[i];
      f.trail.push({x:f.x,y:f.y});
      if(f.trail.length>6) f.trail.shift();
      f.x+=f.vx; f.y+=f.vy; f.vx*=0.96; f.vy*=0.96; f.vy+=0.05; f.life-=0.018;
      if(f.life<=0){fireworks.splice(i,1);continue;}
      // Trail
      f.trail.forEach((pt,ti)=>{
        const a = (ti/f.trail.length)*f.life*0.6;
        celebCtx.beginPath();
        celebCtx.arc(pt.x,pt.y,1+ti*0.3,0,Math.PI*2);
        celebCtx.fillStyle = f.col;
        celebCtx.globalAlpha = a;
        celebCtx.fill();
      });
      // Head
      celebCtx.beginPath();
      celebCtx.arc(f.x,f.y,2.5,0,Math.PI*2);
      celebCtx.fillStyle = '#fff';
      celebCtx.globalAlpha = f.life;
      celebCtx.fill();
      celebCtx.beginPath();
      celebCtx.arc(f.x,f.y,1.5,0,Math.PI*2);
      celebCtx.fillStyle = f.col;
      celebCtx.globalAlpha = f.life;
      celebCtx.fill();
    }
    celebCtx.globalAlpha = 1;
  }
  animate();
}

// ── Tab visibility handling ───────────────────────────────────────
// When tab becomes hidden, record the time.
// When it becomes visible again, fast-forward state correctly
// (award banked pixels, reset animation timestamps) instead of
// running thousands of catch-up ticks.

let _hiddenAt = null;
let _lastWaveTick = 0;
let _lastSpriteTick = 0;

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    _hiddenAt = performance.now();
  } else {
    if (_hiddenAt !== null) {
      const elapsed = (performance.now() - _hiddenAt) / 1000; // seconds hidden

      // Award banked pixel regen (capped at BUCKET_MAX)
      if (elapsed > 0) {
        const gained = Math.floor(elapsed / REGEN_INTERVAL);
        if (gained > 0) {
          pixelBucket = Math.min(BUCKET_MAX, pixelBucket + gained);
          // Recalculate countdown timer
          const remainder = elapsed % REGEN_INTERVAL;
          regenSecsLeft = Math.max(1, REGEN_INTERVAL - Math.floor(remainder));
          updateBucketHUD();
        }
      }

      // Reset animation timestamps so they resume from now,
      // not from 12 hours ago
      _lastWaveTick = performance.now();
      _lastSpriteTick = performance.now();
      _hiddenAt = null;
    }
  }
});

  { name:'Soldier',    min:0,   bombType:null,    bombCost:0,  bombRadius:0,   bonus:0, highlightMult:0 },
  { name:'Lieutenant', min:50,  bombType:null,    bombCost:0,  bombRadius:0,   bonus:0, highlightMult:0 },
  { name:'Captain',    min:150, bombType:'Mortar', bombCost:10, bombRadius:20,  bonus:0, highlightMult:0 },
  { name:'General',    min:300, bombType:'MOAB',   bombCost:50, bombRadius:100, bonus:1, highlightMult:2 },

// Persistent XP counter
let totalPixelsEverPlaced = parseInt(localStorage.getItem('pw_xp') || '0', 10);

function saveXP(){
  localStorage.setItem('pw_xp', String(totalPixelsEverPlaced));
}

function getCurrentRank(){
  let rank = RANKS[0];
  for(const r of RANKS) if(totalPixelsEverPlaced >= r.min) rank=r;
  return rank;
}

function getRankIndex(){
  let idx=0;
  for(let i=0;i<RANKS.length;i++) if(totalPixelsEverPlaced>=RANKS[i].min) idx=i;
  return idx;
}

// Award XP for each pixel placed (called from claimPixel)
function awardXP(n=1){
  totalPixelsEverPlaced += n;
  saveXP();
  refreshRankUI();
}

// ── Highlight / target system ─────────────────────────────────────
let highlightGeoIdx    = -1;   // currently highlighted country index
let highlightExpiry    = 0;    // timestamp when highlight expires
let highlightTimer     = null; // setInterval for countdown

function setHighlight(geoIdx){
  const rank = getCurrentRank();
  if(rank.highlightMult < 2) return; // General+ only
  if(highlightTimer) clearInterval(highlightTimer);
  highlightGeoIdx = geoIdx;
  highlightExpiry = Date.now() + 30000;
  updateHighlightBanner();
  highlightTimer = setInterval(()=>{
    if(Date.now() >= highlightExpiry){
      clearHighlight();
    } else {
      updateHighlightBanner();
    }
  }, 1000);
}

function clearHighlight(){
  highlightGeoIdx = -1;
  highlightExpiry = 0;
  _hlPixelCache = null;
  if(highlightTimer){ clearInterval(highlightTimer); highlightTimer=null; }
  updateHighlightBanner();
}

function updateHighlightBanner(){
  const el = document.getElementById('highlight-banner');
  if(!el) return;
  if(highlightGeoIdx < 0 || Date.now() >= highlightExpiry){
    el.style.display='none'; return;
  }
  const remaining = Math.ceil((highlightExpiry - Date.now()) / 1000);
  const country = featList[highlightGeoIdx];
  const mult = getCurrentRank().highlightMult;
  el.style.display = 'block';
  el.innerHTML = `<span style="color:#fbbf24">&#9733; ATTACK BONUS</span> · 
    <span style="color:${country?.color||'#fff'}">${country?.name||'?'}</span> · 
    <b style="color:#22c55e">+${mult}× free pixels/stroke</b> · 
    <span style="color:#64748b">${remaining}s</span>`;
}

// How many bonus pixels this stroke gets (0 if no highlight active)
function strokeBonus(){
  if(highlightGeoIdx < 0 || Date.now() >= highlightExpiry) return 0;
  // Only applies if the player is painting in the highlighted country
  return getCurrentRank().highlightMult;
}

// ── Highlight country flash overlay ──────────────────────────────
// Draws a slow-pulsing gold wash over the highlighted country's pixels
// on the c-overlay canvas. Runs at ~20fps, separate from bomb preview.
let _hlFlashFrame = 0;
let _hlFlashRaf   = null;
let _hlPixelCache = null;  // cached pixel indices for highlighted country

function buildHighlightCache(geoIdx){
  if(geoIdx < 0){ _hlPixelCache = null; return; }
  const arr = [];
  for(let i=0;i<MAP_PX;i++){
    if(featByPixel[i]===geoIdx && landMask[i]) arr.push(i);
  }
  _hlPixelCache = arr;
}

function tickHighlightFlash(){
  _hlFlashRaf = requestAnimationFrame(tickHighlightFlash);

  // Check expiry — only when a highlight is actually active
  if(highlightGeoIdx >= 0 && highlightExpiry > 0 && Date.now() >= highlightExpiry){
    clearHighlight();
  }

  if(highlightGeoIdx < 0){
    // Always clear the canvas when not highlighting (no pixel cache needed)
    hlCtx.clearRect(0,0,MAP_W,MAP_H);
    _hlPixelCache = null;
    return;
  }
  if(!_hlPixelCache) buildHighlightCache(highlightGeoIdx);
  if(!_hlPixelCache || _hlPixelCache.length===0) return;

  // Throttle to ~20fps
  _hlFlashFrame++;
  if(_hlFlashFrame % 3 !== 0) return;

  // Pulse: sin wave over 2-second cycle → alpha 0.05 to 0.25
  const t = Date.now() / 1000;
  const alpha = 0.05 + 0.20 * (0.5 + 0.5 * Math.sin(t * Math.PI)); // 0.05–0.25

  // Draw gold wash over highlighted country pixels using ImageData
  // Only redraw the bounding box of the country for performance
  // Use a cached bounding box
  if(!_hlPixelCache._bbox){
    let x0=MAP_W,y0=MAP_H,x1=0,y1=0;
    for(const i of _hlPixelCache){
      const x=i%MAP_W,y=(i/MAP_W)|0;
      if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;
    }
    _hlPixelCache._bbox={x0,y0,w:x1-x0+1,h:y1-y0+1};
  }
  const {x0,y0,w,h} = _hlPixelCache._bbox;
  const img = ovCtx.createImageData(w,h);
  const d   = img.data;
  const a   = Math.round(alpha*255);
  for(const i of _hlPixelCache){
    const px=(i%MAP_W)-x0, py=((i/MAP_W)|0)-y0;
    const p=(py*w+px)*4;
    d[p]=251; d[p+1]=191; d[p+2]=36; d[p+3]=a; // gold #fbbf24
  }
  hlCtx.clearRect(x0,y0,w,h);
  hlCtx.putImageData(img,x0,y0);
}

    setTimeout(()=>bc.style.color="",600);
    return;
  }
  const bt = types.find(t=>t.key===selectedBombType)||types[0];
  if(pixelBucket < bt.cost){
    // Not enough pixels — flash red
    const bc=$("bucket-count");
    bc.style.color="#ef4444";
    setTimeout(()=>bc.style.color="",600);
    return;
  }
  bombMode=!bombMode;
  this.classList.toggle("active",bombMode);
  vp.style.cursor=bombMode?"crosshair":"crosshair";
});
$("btn-brd").addEventListener("click",function(){
  sfxUIClick();
  if(showBorders && !borderDark){
    // Light → Dark
    borderDark=true;
    reborderCanvas();
    this.textContent="Borders Dark";
  } else if(showBorders && borderDark){
    // Dark → Off
    showBorders=false;

    showBorders=true;

});

$("brng").addEventListener("input",e=>{brushSize=+e.target.value;$("blbl").textContent=brushSize+"px";});

// Touch
let lastDist=null;
vp.addEventListener("touchstart",e=>{
  if(e.touches.length===1){isPainting=true;const t=e.touches[0],p=screenToMap(t.clientX,t.clientY);paintBrush(p.x,p.y);}
  if(e.touches.length===2){isPainting=false;lastDist=tdist(e);}e.preventDefault();
},{passive:false});
vp.addEventListener("touchmove",e=>{
  if(e.touches.length===1&&isPainting){const t=e.touches[0],p=screenToMap(t.clientX,t.clientY);paintBrush(p.x,p.y);}
  if(e.touches.length===2){const d=tdist(e);if(lastDist){const r=vp.getBoundingClientRect();doZoom(d/lastDist,((e.touches[0].clientX+e.touches[1].clientX)/2)-r.left,((e.touches[0].clientY+e.touches[1].clientY)/2)-r.top);}lastDist=d;}
  e.preventDefault();
},{passive:false});
vp.addEventListener("touchend",()=>{if(isPainting)setTimeout(runAutoFill,0);isPainting=false;lastDist=null;});
function tdist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}

// ── Procedural fallback ───────────────────────────────────────────
async function proceduralFallback(){
  featList=[{id:"0",name:"Uncharted World",color:"#3b82f6",geometry:null}];
  featByPixel=new Int16Array(MAP_PX).fill(0);claimByPixel=new Int16Array(MAP_PX).fill(-1);landMask=new Uint8Array(MAP_PX);
  const pm=mkPerm(),noise=mkNoise(pm),img=bctx.createImageData(MAP_W,MAP_H),d=img.data;
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const nx=x/MAP_W-.5,ny=y/MAP_H-.5;
      let v=noise(nx*4,ny*4)*.6+noise(nx*8,ny*8)*.3+noise(nx*16,ny*16)*.1;v-=Math.abs(ny)*2.5*.35;
      const i=y*MAP_W+x,p=i*4;
      if(v>.04){landMask[i]=1;geoTotal[0]=(geoTotal[0]||0)+1;d[p]=44;d[p+1]=60;d[p+2]=44;}
      else{featByPixel[i]=-1;d[p]=10;d[p+1]=18;d[p+2]=44;}d[p+3]=255;
    }
    if(y%256===0){prog(10+Math.floor(y/MAP_H*86),"Generating procedural map…");await sleep(1);}
  }
  bctx.putImageData(img,0,0);
  // Init all systems that boot() normally sets up
  totalLandPx=Object.values(geoTotal).reduce((a,b)=>a+b,0);
  buildCselOptions();
  selectCountry(0);
  [cBase,cWaves,cSprites,cClaim,cFlags,cBorder,cHighlight,cOverlay].forEach(c=>{c.width=MAP_W;c.height=MAP_H;});
  [bctx,claimCtx,flagCtx,bordCtx,ovCtx,hlCtx].forEach(c=>{c.imageSmoothingEnabled=false;});
  initWaves();buildWaveBase();tickWaves();
  initSprites();requestAnimationFrame(tickSprites);
  refreshRankUI();tickHighlightFlash();
  updateBucketHUD();
  prog(100,"Ready (offline mode)");await sleep(80);$("loading").style.display="none";resetView();
}
function mkPerm(){const p=Array.from({length:256},(_,i)=>i);for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}return[...p,...p];}
function mkNoise(pm){
  const fd=t=>t*t*t*(t*(t*6-15)+10),lp=(a,b,t)=>a+t*(b-a),gr=(h,x,y)=>{switch(h&3){case 0:return x+y;case 1:return -x+y;case 2:return x-y;default:return -x-y;}};
  return(x,y)=>{const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fd(x),v=fd(y),a=pm[X]+Y,b=pm[X+1]+Y;return lp(lp(gr(pm[a],x,y),gr(pm[b],x-1,y),u),lp(gr(pm[a+1],x,y-1),gr(pm[b+1],x-1,y-1),u),v);};
}

// ── Start — no external library loading needed! ───────────────────
(async()=>{
  prog(3,"Initialising…");
  try{
    await boot();
  }catch(e){
    console.error("boot() failed:",e);
    showErr("Map load failed: "+e.message+"\n\nFalling back to procedural map…");
    await sleep(2000);
    $("err-box").style.display="none";$("prog-bar").style.display="block";$("retry-btn").style.display="none";
    await proceduralFallback();
  }
})();
