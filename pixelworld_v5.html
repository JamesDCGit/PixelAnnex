<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelWorld — 4096×2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#070d1a;font-family:'Courier New',monospace}
#app{display:flex;flex-direction:column;width:100vw;height:100vh}
#toolbar{display:flex;align-items:center;gap:8px;padding:7px 14px;flex-shrink:0;background:#0c1526;border-bottom:1px solid rgba(255,255,255,0.07);flex-wrap:wrap;z-index:20;min-height:46px;}
#toolbar h1{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#e2e8f0;white-space:nowrap}
#toolbar h1 span{color:#3b82f6}
.sep{width:1px;height:20px;background:rgba(255,255,255,0.08);flex-shrink:0}
select,.btn{background:#162035;border:1px solid rgba(255,255,255,0.1);color:#cbd5e1;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;transition:border-color .15s,background .15s;}
select:hover,.btn:hover{border-color:rgba(255,255,255,.22);background:#1e2e4a}
select:focus,.btn:focus{outline:none;border-color:#3b82f6}
#brush-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:#475569}
#brush-wrap input{width:70px;accent-color:#3b82f6}
#stats{font-size:11px;color:#334155;margin-left:auto;white-space:nowrap}
#stats b{color:#64748b}
#swatch{width:12px;height:12px;border-radius:2px;border:1px solid rgba(255,255,255,.12);flex-shrink:0}
#viewport{flex:1;position:relative;overflow:hidden;cursor:crosshair}
canvas{position:absolute;top:0;left:0;transform-origin:0 0;image-rendering:pixelated;image-rendering:crisp-edges}
#c-border{pointer-events:none}
#loading{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#070d1a;gap:16px;}
#loading h2{font-size:14px;font-weight:700;color:#e2e8f0;letter-spacing:.12em;text-transform:uppercase}
#load-msg{font-size:11px;color:#64748b;min-height:1.4em;text-align:center;max-width:360px;line-height:1.5}
#prog-bar{width:260px;height:2px;background:#162035;border-radius:1px;overflow:hidden}
#prog-fill{height:100%;background:#3b82f6;width:0%;transition:width .4s}
#err-box{display:none;color:#f87171;font-size:11px;text-align:center;max-width:360px;line-height:1.7;padding:12px 16px;border:1px solid rgba(248,113,113,0.3);border-radius:6px;white-space:pre-line}
#retry-btn{display:none;background:#162035;border:1px solid rgba(255,255,255,0.15);color:#93c5fd;padding:6px 16px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
#retry-btn:hover{background:#1e2e4a}
.hud{position:absolute;background:rgba(7,13,26,.9);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 12px;}
#legend{bottom:12px;left:12px;max-width:200px;max-height:260px;overflow-y:auto}
#legend::-webkit-scrollbar{width:3px}
#legend::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
#legend h3{font-size:9px;color:#334155;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px;color:#64748b;white-space:nowrap}
.leg-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
#zoom-hud{bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;padding:6px}
.z-btn{width:27px;height:27px;border-radius:5px;background:#162035;border:1px solid rgba(255,255,255,.08);color:#64748b;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1;font-family:inherit;}
.z-btn:hover{background:#1e2e4a;color:#e2e8f0}
#tip{position:absolute;display:none;z-index:30;pointer-events:none;background:rgba(7,13,26,.95);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 10px;font-size:11px;color:#cbd5e1;white-space:nowrap;}
#tip-name{font-weight:700;color:#e2e8f0;margin-bottom:2px}
#tip-sub{font-size:10px;color:#475569}
#banner{position:absolute;top:56px;left:50%;transform:translateX(-50%);background:#0b1e3d;border:1px solid #2563eb;border-radius:7px;padding:7px 20px;font-size:12px;color:#93c5fd;display:none;z-index:50;white-space:nowrap;}

// ── Constants ─────────────────────────────────────────────────────
const MAP_W=4096, MAP_H=2048, MAP_PX=MAP_W*MAP_H;

// ── Pure-JS equirectangular projection ────────────────────────────
// lon [-180,180] → x [0,MAP_W]
// lat [90,-90]   → y [0,MAP_H]
// This is ALL we need — no d3-geo required.
function project(lon,lat){ return [(lon+180)/360*MAP_W, (90-lat)/180*MAP_H]; }

// ── Draw a GeoJSON geometry ring onto a canvas context ────────────
// Handles Polygon and MultiPolygon, calls ctx.beginPath/fill externally
// Split a lon/lat ring into sub-rings wherever it crosses the antimeridian (lon=±180).
// Without this, countries like Russia, USA (Alaska), and Fiji draw a stroke
// across the entire map width.
function splitAntimeridian(ring){
  const out=[];
  let cur=[];
  for(let i=0;i<ring.length;i++){
    const [lon,lat]=ring[i];
    if(i===0){cur.push([lon,lat]);continue;}
    const [pLon,pLat]=ring[i-1];
    const dLon=lon-pLon;
    if(Math.abs(dLon)>180){
      // Interpolate latitude at the crossing edge
      const fromSide=dLon>0?-180:180;
      const toSide=dLon>0?180:-180;
      // How far along [pLon→lon+/-360] is the crossing at fromSide?
      const span=dLon>0?(lon-pLon-360):(lon-pLon+360);
      const t=(fromSide-pLon)/span;
      const crossLat=pLat+t*(lat-pLat);
      cur.push([fromSide,crossLat]);
      if(cur.length>=2)out.push(cur);
      cur=[[toSide,crossLat],[lon,lat]];
    }else{
      cur.push([lon,lat]);
    }
  }
  if(cur.length>=2)out.push(cur);
  return out;
}

function drawRing(ctx,ring){
  for(const sub of splitAntimeridian(ring)){
    let first=true;
    for(const [lon,lat] of sub){
      const [x,y]=project(lon,lat);
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    }
    ctx.closePath();
  }
}

function drawGeometry(ctx,geom){
  if(!geom)return;
  if(geom.type==="Polygon"){
    for(const ring of geom.coordinates)drawRing(ctx,ring);
  }else if(geom.type==="MultiPolygon"){
    for(const poly of geom.coordinates)for(const ring of poly)drawRing(ctx,ring);
  }
}

// ── TopoJSON decoder — minimal, no dependencies ───────────────────
// Decodes topojson arcs with delta encoding + dequantization
function topoFeatures(topo){
  const sc=topo.transform?topo.transform.scale:[1,1];
  const tr=topo.transform?topo.transform.translate:[0,0];
  const rawArcs=topo.arcs;

  // Decode a single arc (delta decode + dequantize)
  function decodeArc(i){
    const rev=i<0; const arc=rawArcs[rev?~i:i];
    let x=0,y=0;
    const pts=arc.map(([dx,dy])=>{x+=dx;y+=dy;return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});
    return rev?pts.reverse():pts;
  }

  function arcRing(r){ return r.flatMap(i=>decodeArc(i)); }

  function geomToGeoJSON(g){
    if(!g)return null;
    if(g.type==="Polygon") return{type:"Polygon",coordinates:g.arcs.map(arcRing)};
    if(g.type==="MultiPolygon") return{type:"MultiPolygon",coordinates:g.arcs.map(p=>p.map(arcRing))};
    return null;
  }

  return topo.objects.countries.geometries.map(g=>({
    id:String(g.id??""),
    name:(g.properties&&g.properties.name)||"",
    geometry:geomToGeoJSON(g)
  }));
}

function animateProgress(from,to,ms,msg){
  const t0=performance.now();
  const step=()=>{const t=Math.min((performance.now()-t0)/ms,1);$("prog-fill").style.width=(from+(to-from)*t)+"%";if(t<1)requestAnimationFrame(step);};
  $("load-msg").textContent=msg; requestAnimationFrame(step);
  return new Promise(r=>setTimeout(r,ms));

const FLAG_W=11, FLAG_H=7;

// Decode a compressed flag and return pixel rows
function decodeFlag(id){
  const f=FLAG_DATA[String(id)];
  if(!f) return null;
  const rows=[];
  for(let y=0;y<FLAG_H;y++){
    const row=[];
    for(let x=0;x<FLAG_W;x++){
      const idx=parseInt(f.d[y*FLAG_W+x]);
      row.push(f.p[idx]);
    }
    rows.push(row);
  }
  return rows;
}

// Track placed flags: geoIdx -> {claimerIdx, cx, cy}
const placedFlags={};

// Compute centroid of pixels owned by claimerIdx in geo country geoIdx
function getGeoCentroid(geoIdx, claimerIdx){
  let sx=0,sy=0,n=0;
  for(let i=0;i<MAP_PX;i++){
    if(featByPixel[i]===geoIdx&&claimByPixel[i]===claimerIdx){
      sx+=i%MAP_W; sy+=(i/MAP_W)|0; n++;
    }
  }
  if(n===0) return null;
  return{x:Math.round(sx/n), y:Math.round(sy/n)};
}

// Draw a flag at pixel position (cx,cy) - centered on that pixel
function drawFlagAt(cx,cy,claimer){
  const rows=decodeFlag(claimer.id);
  if(!rows) return;
  const ox=cx-Math.floor(FLAG_W/2);
  const oy=cy-Math.floor(FLAG_H/2);
  const img=flagCtx.createImageData(FLAG_W+2,FLAG_H+2);
  const d=img.data;
  // Black 1px outline
  for(let y=0;y<FLAG_H+2;y++) for(let x=0;x<FLAG_W+2;x++){
    const p=(y*(FLAG_W+2)+x)*4;
    d[p]=0;d[p+1]=0;d[p+2]=0;d[p+3]=255;
  }
  // Flag pixels
  for(let y=0;y<FLAG_H;y++){
    for(let x=0;x<FLAG_W;x++){
      const col=rows[y][x];
      const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
      const p=((y+1)*(FLAG_W+2)+(x+1))*4;
      d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=255;
    }
  }
  flagCtx.putImageData(img, ox-1, oy-1);
}

// Place or update the flag for a conquered geo country
function placeFlag(geoIdx, claimerIdx){
  // Find centroid (throttled — only sample every 8th pixel for speed)
  let sx=0,sy=0,n=0;
  for(let i=0;i<MAP_PX;i+=8){
    if(featByPixel[i]===geoIdx&&claimByPixel[i]===claimerIdx){
      sx+=i%MAP_W; sy+=(i/MAP_W)|0; n++;
    }
  }
  if(n===0) return;
  const cx=Math.round(sx/n), cy=Math.round(sy/n);
  placedFlags[geoIdx]={claimerIdx,cx,cy};
  drawFlagAt(cx,cy,featList[claimerIdx]);
}

// Erase a flag for a geo country (when recaptured)
function eraseFlag(geoIdx){
  const f=placedFlags[geoIdx];
  if(!f) return;
  const ox=f.cx-Math.floor(FLAG_W/2)-1;
  const oy=f.cy-Math.floor(FLAG_H/2)-1;
  flagCtx.clearRect(ox,oy,FLAG_W+2,FLAG_H+2);
  delete placedFlags[geoIdx];
}


// ── finisherFill: claim all remaining pixels when 80% hit ───────────────────
function finisherFill(geoIdx,claimerIdx){
  const [r,g,b]=hexRgb(featList[claimerIdx].color);
  const toFill=[];
  for(let i=0;i<MAP_PX;i++){
    if(featByPixel[i]!==geoIdx||claimByPixel[i]===claimerIdx||!landMask[i])continue;
    toFill.push(i);
  }
  for(const gi of toFill){
    const prev=claimByPixel[gi];
    if(prev>=0){
      claimerCount[prev]=Math.max(0,(claimerCount[prev]||1)-1);
      if(geoClaimCnt[geoIdx]&&geoClaimCnt[geoIdx][prev])
        geoClaimCnt[geoIdx][prev]=Math.max(0,(geoClaimCnt[geoIdx][prev]||1)-1);
      const prevKey=geoIdx+":"+prev;
      if(conqueredSet.has(prevKey)){conqueredSet.delete(prevKey);eraseFlag(geoIdx);}
    }else{totalClaimed++;}
    claimByPixel[gi]=claimerIdx;
    claimerCount[claimerIdx]=(claimerCount[claimerIdx]||0)+1;
    if(!geoClaimCnt[geoIdx])geoClaimCnt[geoIdx]={};
    geoClaimCnt[geoIdx][claimerIdx]=(geoClaimCnt[geoIdx][claimerIdx]||0)+1;
  }
  if(toFill.length>0){
    let fx0=MAP_W,fy0=MAP_H,fx1=0,fy1=0;
    for(const gi of toFill){const px=gi%MAP_W,py=(gi/MAP_W)|0;if(px<fx0)fx0=px;if(px>fx1)fx1=px;if(py<fy0)fy0=py;if(py>fy1)fy1=py;}
    const fw=fx1-fx0+1,fh=fy1-fy0+1;
    const img=claimCtx.getImageData(fx0,fy0,fw,fh);const d=img.data;
    for(const gi of toFill){const px=(gi%MAP_W)-fx0,py=((gi/MAP_W)|0)-fy0;const p=(py*fw+px)*4;d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=215;}
    claimCtx.putImageData(img,fx0,fy0);
  }
  $("px-count").textContent=totalClaimed.toLocaleString();
  scheduleLegend();
  setTimeout(()=>placeFlag(geoIdx,claimerIdx),0);
}

// ── checkConquest: 80% threshold check ───────────────────────────────────────
function checkConquest(geoIdx,claimerIdx){
  const key=geoIdx+":"+claimerIdx;
  if(conqueredSet.has(key))return false;
  const owned=(geoClaimCnt[geoIdx]&&geoClaimCnt[geoIdx][claimerIdx])||0;
  const total=geoTotal[geoIdx]||0;
  if(total===0||owned/total<CONQUEST_THRESHOLD)return false;
  conqueredSet.add(key);
  const bn=$("banner");
  bn.innerHTML="&#9873; <span style='color:"+featList[claimerIdx].color+"'>"
    +featList[claimerIdx].name+"</span> conquered <b>"+featList[geoIdx].name+"</b>!";
  bn.style.display="block";clearTimeout(bn._t);bn._t=setTimeout(()=>bn.style.display="none",4000);
  setTimeout(()=>finisherFill(geoIdx,claimerIdx),0);
  return true;
}

// ── checkConquestReversal: only erase if drops below threshold ───────────────
function checkConquestReversal(geoIdx,prev){
  const key=geoIdx+":"+prev;
  if(!conqueredSet.has(key))return;
  const owned=(geoClaimCnt[geoIdx]&&geoClaimCnt[geoIdx][prev])||0;
  const total=geoTotal[geoIdx]||0;
  if(total===0||owned/total<CONQUEST_THRESHOLD){conqueredSet.delete(key);eraseFlag(geoIdx);}
}

  const csel=$("csel"); csel.innerHTML="";
  [...featList].sort((a,b)=>a.name.localeCompare(b.name)).forEach(f=>{
    const o=document.createElement("option");o.value=featList.indexOf(f);o.textContent=f.name;csel.appendChild(o);
  });
  const usaIdx=featList.findIndex(f=>f.id==="840");
  currentIdx=usaIdx>=0?usaIdx:0; csel.value=currentIdx;
  const sw=$("swatch"); sw.style.background=featList[currentIdx].color;
  csel.onchange=e=>{currentIdx=+e.target.value;sw.style.background=featList[currentIdx].color;};

  // ── Render base map on main canvas ───────────────────────────
  prog(25,"Rendering base map…");
  bctx.fillStyle="#0a1628"; bctx.fillRect(0,0,MAP_W,MAP_H);

  for(let i=0;i<featList.length;i++){
    const f=featList[i];
    if(!f.geometry)continue;
    const [r,g,b]=hexRgb(f.color);
    bctx.fillStyle="rgb("+Math.floor(r*.22+28)+","+Math.floor(g*.22+36)+","+Math.floor(b*.22+24)+")";
    bctx.beginPath();
    drawGeometry(bctx,f.geometry);
    bctx.fill("evenodd");
    if(i%20===0){prog(25+Math.floor(i/featList.length*27),"Rendering countries… "+(i+1)+"/"+featList.length);await sleep(1);}
  }
  console.log("Base map rendered");

  // ── Build pixel-country mask on offscreen canvas ──────────────
  // Encode feat index as: R=hi byte, G=lo byte, B=200 (land marker)
  prog(54,"Building country mask…"); await sleep(8);
  const mc=document.createElement("canvas"); mc.width=MAP_W; mc.height=MAP_H;
  const mctx=mc.getContext("2d");
  if(!mctx) throw new Error("Failed to get offscreen canvas context");
  mctx.fillStyle="#000000"; mctx.fillRect(0,0,MAP_W,MAP_H);

  for(let i=0;i<featList.length;i++){
    const f=featList[i];
    if(!f.geometry)continue;
    mctx.fillStyle="rgb("+((i>>8)&0xFF)+","+(i&0xFF)+",200)";
    mctx.beginPath();
    drawGeometry(mctx,f.geometry);
    mctx.fill("evenodd");
    if(i%20===0){prog(54+Math.floor(i/featList.length*18),"Building mask… "+(i+1)+"/"+featList.length);await sleep(1);}
  }
  console.log("Mask rendered");

  // ── Extract mask pixels → typed arrays ───────────────────────
  prog(74,"Extracting pixel data…"); await sleep(8);
  const raw=mctx.getImageData(0,0,MAP_W,MAP_H).data;
  featByPixel =new Int16Array(MAP_PX).fill(-1);
  claimByPixel=new Int16Array(MAP_PX).fill(-1);
  landMask    =new Uint8Array(MAP_PX);

  const CHUNK=524288;
  for(let s=0;s<MAP_PX;s+=CHUNK){
    const end=Math.min(s+CHUNK,MAP_PX);
    for(let i=s;i<end;i++){
      if(raw[i*4+2]>=190){
        landMask[i]=1;
        const idx=(raw[i*4]<<8)|raw[i*4+1];
        if(idx<featList.length){featByPixel[i]=idx;geoTotal[idx]=(geoTotal[idx]||0)+1;}
      }
    }
    prog(74+Math.floor(s/MAP_PX*10),"Processing pixels…");
    await sleep(1);
  }
  const landPx=Object.values(geoTotal).reduce((a,b)=>a+b,0);
  console.log("Pixel extraction done. Land px:",landPx,"Countries with land:",Object.keys(geoTotal).length);

  // ── Remove micro-islands (<10 connected pixels) ───────────────────────────
  // Flood-fill each connected land component. Any component with <10 pixels
  // gets removed from landMask and featByPixel (treated as ocean).
  // This cleans up rendering artifacts and unclaimable specks.
  prog(84,"Removing micro-islands…"); await sleep(5);
  {
    const visited=new Uint8Array(MAP_PX);
    const DX2=[-1,1,0,0],DY2=[0,0,-1,1];
    let removed=0;
    for(let seed=0;seed<MAP_PX;seed++){
      if(!landMask[seed]||visited[seed]) continue;
      // BFS to find this connected component
      const component=[];
      const q=[seed]; visited[seed]=1;
      let qh=0;
      while(qh<q.length){
        const ci=q[qh++];
        component.push(ci);
        const cx=ci%MAP_W,cy=(ci/MAP_W)|0;
        for(let d=0;d<4;d++){
          const nx=cx+DX2[d],ny=cy+DY2[d];
          if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
          const ni=ny*MAP_W+nx;
          if(landMask[ni]&&!visited[ni]){visited[ni]=1;q.push(ni);}
        }
      }
      if(component.length<10){
        // Remove this micro-island
        for(const ci of component){
          landMask[ci]=0;
          const geo=featByPixel[ci];
          if(geo>=0&&geoTotal[geo]){
            geoTotal[geo]=Math.max(0,geoTotal[geo]-1);
          }
          featByPixel[ci]=-1;
        }
        removed+=component.length;
      }
    }
    console.log("Micro-islands removed:",removed,"pixels");
  }

  // ── Draw borders on border canvas ────────────────────────────
  prog(86,"Drawing country borders…"); await sleep(5);

  // Hard pixel borders: scan mask data, mark boundary pixels solid white.
  // No canvas stroke, no antialiasing. Writing both sides of each edge = 2px thick.
  prog(86,"Drawing pixel-perfect borders…"); await sleep(5);

  const borderImg=bordCtx.createImageData(MAP_W,MAP_H);
  const bd=borderImg.data;
  bordPixel=new Uint8Array(MAP_PX);
  function wb(i){bd[i*4]=255;bd[i*4+1]=255;bd[i*4+2]=255;bd[i*4+3]=255;bordPixel[i]=1;}

  const CHUNK2=262144;
  for(let s=0;s<MAP_PX;s+=CHUNK2){
    const end2=Math.min(s+CHUNK2,MAP_PX);
    for(let i=s;i<end2;i++){
      const x=i%MAP_W,y=(i/MAP_W)|0;
      const ci=featByPixel[i];
      if(x<MAP_W-1&&featByPixel[i+1]!==ci){wb(i);wb(i+1);}
      if(y<MAP_H-1&&featByPixel[i+MAP_W]!==ci){wb(i);wb(i+MAP_W);}
    }
    prog(86+Math.floor(s/MAP_PX*12),"Drawing borders…");
    await sleep(1);
  }
  bordCtx.putImageData(borderImg,0,0);
  console.log("Borders drawn – pixel-perfect 2px no antialiasing");

  prog(100,"Ready!"); await sleep(150);
  $("loading").style.display="none";
  resetView();
  console.log("PixelWorld ready!");
}

// ── Claim pixels ──────────────────────────────────────────────────
function claimPixel(px,py){
  if(px<0||px>=MAP_W||py<0||py>=MAP_H)return;
  const i=py*MAP_W+px;
  if(!landMask[i])return;
  const prev=claimByPixel[i];
  if(prev===currentIdx)return;
  const geo=featByPixel[i];
  if(prev>=0){
    claimerCount[prev]=(claimerCount[prev]||1)-1;
    if(geo>=0&&geoClaimCnt[geo]){
      geoClaimCnt[geo][prev]=(geoClaimCnt[geo][prev]||1)-1;
      checkConquestReversal(geo,prev);
    }
  }else{totalClaimed++;$("px-count").textContent=totalClaimed.toLocaleString();}
  claimByPixel[i]=currentIdx;
  // Track which geo countries this stroke touches (for auto-fill)
  if(geo>=0) strokeGeos.add(geo);
  claimerCount[currentIdx]=(claimerCount[currentIdx]||0)+1;
  if(geo>=0){
    if(!geoClaimCnt[geo])geoClaimCnt[geo]={};
    geoClaimCnt[geo][currentIdx]=(geoClaimCnt[geo][currentIdx]||0)+1;
       checkConquest(geo,currentIdx);
  }
  const [r,g,b]=hexRgb(featList[currentIdx].color);
  const id=claimCtx.createImageData(1,1);
  id.data[0]=r;id.data[1]=g;id.data[2]=b;id.data[3]=215;
  claimCtx.putImageData(id,px,py);
}

function paintBrush(px,py){
  const half=Math.floor(brushSize/2),rsq=(brushSize/2)**2;
  for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){
    if(brushSize>3&&dx*dx+dy*dy>rsq)continue;
    claimPixel(px+dx,py+dy);
  }
  scheduleLegend();
}

// ── Legend ────────────────────────────────────────────────────────
let legTimer=null;
function scheduleLegend(){
  clearTimeout(legTimer);legTimer=setTimeout(()=>{
    const el=$("leg-items");el.innerHTML="";
    Object.entries(claimerCount).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,20).forEach(([idx,cnt])=>{
      const f=featList[+idx];if(!f)return;
      const row=document.createElement("div");row.className="leg-row";
      row.innerHTML="<div class='leg-dot' style='background:"+f.color+"'></div><span>"+f.name+": "+cnt.toLocaleString()+"</span>";
      el.appendChild(row);
    });
  },120);
}

// ── View ─────────────────────────────────────────────────────────
function applyT(){const t="translate("+ox+"px,"+oy+"px) scale("+scale+")";[cBase,cClaim,cFlags,cBorder].forEach(c=>c.style.transform=t);}
function clamp(){const cw=vp.clientWidth,ch=vp.clientHeight;ox=Math.max(Math.min(0,cw-MAP_W*scale),Math.min(0,ox));oy=Math.max(Math.min(0,ch-MAP_H*scale),Math.min(0,oy));}
function resetView(){const cw=vp.clientWidth,ch=vp.clientHeight;scale=Math.min(cw/MAP_W,ch/MAP_H)*.98;ox=(cw-MAP_W*scale)/2;oy=(ch-MAP_H*scale)/2;applyT();}
function doZoom(f,cx,cy){const ns=Math.max(.25,Math.min(40,scale*f));ox=cx-(cx-ox)*(ns/scale);oy=cy-(cy-oy)*(ns/scale);scale=ns;clamp();applyT();}
function screenToMap(sx,sy){const r=vp.getBoundingClientRect();return{x:Math.floor((sx-r.left-ox)/scale),y:Math.floor((sy-r.top-oy)/scale)};}


// ── Auto-fill enclosed regions ────────────────────────────────────────────
// CORRECT ALGORITHM:
// For each geographic country the stroke touches:
//   1. Seed BFS from that country's border pixels (pixels adjacent to ocean/other country)
//      that have not been claimed by the current player.
//   2. Flood inward through the country, stopping at own claimed pixels.
//   3. Any country pixel NOT reached = truly enclosed by the player's stroke.
//
// This means:
//   - Incomplete strokes fill nothing (no enclosed region exists)
//   - Fills are bounded by the geographic country border automatically
//   - You cannot fill across country borders
//   - Small border completes a loop → only the loop interior fills
const MAX_FILL_PX = 500000; // safety cap
const CONQUEST_THRESHOLD = 0.8; // 80% triggers conquest

function isWallFill(i){
  if(!landMask[i]) return true;               // ocean: wall
  if(claimByPixel[i]===currentIdx) return true; // own pixels: wall
  // border pixels are NOT walls for seeding (they're the seeds themselves)
  // enemy pixels are passable (get captured)
  return false;
}

// Track which geo countries the current stroke has painted in
let strokeGeos = new Set();

function runAutoFill(){
  if(!bordPixel||strokeGeos.size===0)return;
  const geosToCheck = new Set(strokeGeos);
  strokeGeos = new Set(); // reset for next stroke

  const DX=[-1,1,0,0], DY=[0,0,-1,1];

  for(const geo of geosToCheck){
    if(geo<0) continue;

    // BFS seeded from geo-country border pixels (adjacent to outside/other country)
    // that are accessible (not blocked by own claimed pixels)
    const outside=new Uint8Array(MAP_PX);
    const queue=new Int32Array(geoTotal[geo]||100000);
    let head=0, tail=0;

    function enqGeo(i){
      if(outside[i]||isWallFill(i))return;
      outside[i]=1; queue[tail++]=i;
    }

    // Seed: scan all pixels of this geo country for border pixels
    // bordPixel[i]=1 means adjacent to different geo or ocean
    for(let i=0;i<MAP_PX;i++){
      if(featByPixel[i]===geo && bordPixel[i]===1) enqGeo(i);
    }

    // BFS inward through the geo country
    while(head<tail){
      const i=queue[head++];
      const x=i%MAP_W, y=(i/MAP_W)|0;
      for(let d=0;d<4;d++){
        const nx=x+DX[d], ny=y+DY[d];
        if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
        const ni=ny*MAP_W+nx;
        if(featByPixel[ni]!==geo||outside[ni]||isWallFill(ni)) continue;
        outside[ni]=1; queue[tail++]=ni;
      }
    }

    // Collect enclosed: in this geo country, not reachable from border, not own pixel
    const enclosed=[];
    for(let i=0;i<MAP_PX;i++){
      if(featByPixel[i]===geo && !outside[i] && !isWallFill(i)) enclosed.push(i);
    }

    if(enclosed.length===0||enclosed.length>MAX_FILL_PX) continue;

    // Claim enclosed pixels
    const [r,g,b]=hexRgb(featList[currentIdx].color);
    for(const gi of enclosed){
      const prev=claimByPixel[gi];
      if(prev>=0){
        claimerCount[prev]=(claimerCount[prev]||1)-1;
        if(geoClaimCnt[geo]&&geoClaimCnt[geo][prev])
          geoClaimCnt[geo][prev]=Math.max(0,(geoClaimCnt[geo][prev]||1)-1);
      }else{
        totalClaimed++;
      }
      claimByPixel[gi]=currentIdx;
      claimerCount[currentIdx]=(claimerCount[currentIdx]||0)+1;
      if(!geoClaimCnt[geo])geoClaimCnt[geo]={};
      geoClaimCnt[geo][currentIdx]=(geoClaimCnt[geo][currentIdx]||0)+1;
    }

    // Batch paint enclosed pixels to claim canvas
    const fillX0=enclosed.reduce((m,gi)=>Math.min(m,gi%MAP_W),MAP_W);
    const fillY0=enclosed.reduce((m,gi)=>Math.min(m,(gi/MAP_W)|0),MAP_H);
    const fillX1=enclosed.reduce((m,gi)=>Math.max(m,gi%MAP_W),0);
    const fillY1=enclosed.reduce((m,gi)=>Math.max(m,(gi/MAP_W)|0),0);
    const fw=fillX1-fillX0+1, fh=fillY1-fillY0+1;
    const fillImg=claimCtx.getImageData(fillX0,fillY0,fw,fh);
    const fd=fillImg.data;
    for(const gi of enclosed){
      const fx=(gi%MAP_W)-fillX0, fy=((gi/MAP_W)|0)-fillY0;
      const fp=(fy*fw+fx)*4;
      fd[fp]=r;fd[fp+1]=g;fd[fp+2]=b;fd[fp+3]=215;
    }
    claimCtx.putImageData(fillImg,fillX0,fillY0);

    checkConquest(geo,currentIdx);
  }

  $("px-count").textContent=totalClaimed.toLocaleString();
  scheduleLegend();
  // Check conquest for all geo countries affected by this fill
  const affectedGeos=new Set(enclosed.map(gi=>featByPixel[gi]).filter(g=>g>=0));
  for(const geoIdx of affectedGeos) checkConquest(geoIdx,currentIdx);
}


// ── Input events ─────────────────────────────────────────────────
vp.addEventListener("mousedown",e=>{
  if(e.button===1||e.altKey||e.button===2){isDragging=true;dragBase={x:e.clientX-ox,y:e.clientY-oy};vp.style.cursor="grab";return;}
  isPainting=true;const p=screenToMap(e.clientX,e.clientY);paintBrush(p.x,p.y);
});
vp.addEventListener("mousemove",e=>{
  if(isDragging){ox=e.clientX-dragBase.x;oy=e.clientY-dragBase.y;clamp();applyT();return;}
  if(isPainting){const p=screenToMap(e.clientX,e.clientY);paintBrush(p.x,p.y);}
  if(!landMask)return;
  const p=screenToMap(e.clientX,e.clientY),vr=vp.getBoundingClientRect(),tip=$("tip");
  if(p.x>=0&&p.x<MAP_W&&p.y>=0&&p.y<MAP_H){
    const i=p.y*MAP_W+p.x;
    tip.style.display="block";tip.style.left=(e.clientX-vr.left+14)+"px";tip.style.top=(e.clientY-vr.top-40)+"px";
    const gi=featByPixel[i],ci=claimByPixel[i];
    if(landMask[i]){
      $("tip-name").textContent=gi>=0?featList[gi].name:"Territory";
      const sub=$("tip-sub");sub.textContent=ci>=0?"Claimed by "+featList[ci].name:"Unclaimed";sub.style.color=ci>=0?featList[ci].color:"#475569";
    }else{$("tip-name").textContent="Ocean";$("tip-sub").textContent="";}
  }else{tip.style.display="none";}
});
window.addEventListener("mouseup",()=>{
  if(isPainting) setTimeout(runAutoFill, 10); // defer so last pixel is claimed first
  isPainting=false;isDragging=false;vp.style.cursor="crosshair";
});
vp.addEventListener("mouseleave",()=>{$("tip").style.display="none";isPainting=false;});
vp.addEventListener("contextmenu",e=>e.preventDefault());
vp.addEventListener("wheel",e=>{e.preventDefault();const r=vp.getBoundingClientRect();doZoom(e.deltaY<0?1.12:1/1.12,e.clientX-r.left,e.clientY-r.top);},{passive:false});
$("zi").addEventListener("click",()=>doZoom(1.5,vp.clientWidth/2,vp.clientHeight/2));
$("zo").addEventListener("click",()=>doZoom(1/1.5,vp.clientWidth/2,vp.clientHeight/2));
$("btn-rst").addEventListener("click",resetView);
$("btn-brd").addEventListener("click",function(){showBorders=!showBorders;this.textContent="Borders "+(showBorders?"ON":"OFF");cBorder.style.opacity=showBorders?"1":"0";});
$("btn-clr").addEventListener("click",()=>{
  if(claimByPixel)claimByPixel.fill(-1);claimerCount={};geoClaimCnt={};conqueredSet.clear();totalClaimed=0;
  $("px-count").textContent="0";claimCtx.clearRect(0,0,MAP_W,MAP_H);flagCtx.clearRect(0,0,MAP_W,MAP_H);for(const k in placedFlags)delete placedFlags[k];strokeGeos=new Set();$("leg-items").innerHTML="";
});
$("brng").addEventListener("input",e=>{brushSize=+e.target.value;$("blbl").textContent=brushSize+"px";});

// Touch
let lastDist=null;
vp.addEventListener("touchstart",e=>{
  if(e.touches.length===1){isPainting=true;const t=e.touches[0],p=screenToMap(t.clientX,t.clientY);paintBrush(p.x,p.y);}
  if(e.touches.length===2){isPainting=false;lastDist=tdist(e);}e.preventDefault();
},{passive:false});
vp.addEventListener("touchmove",e=>{
  if(e.touches.length===1&&isPainting){const t=e.touches[0],p=screenToMap(t.clientX,t.clientY);paintBrush(p.x,p.y);}
  if(e.touches.length===2){const d=tdist(e);if(lastDist){const r=vp.getBoundingClientRect();doZoom(d/lastDist,((e.touches[0].clientX+e.touches[1].clientX)/2)-r.left,((e.touches[0].clientY+e.touches[1].clientY)/2)-r.top);}lastDist=d;}
  e.preventDefault();
},{passive:false});
vp.addEventListener("touchend",()=>{if(isPainting)setTimeout(runAutoFill,0);isPainting=false;lastDist=null;});
function tdist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}

// ── Procedural fallback ───────────────────────────────────────────
async function proceduralFallback(){
  featList=[{id:"0",name:"Uncharted World",color:"#3b82f6",geometry:null}];
  featByPixel=new Int16Array(MAP_PX).fill(0);claimByPixel=new Int16Array(MAP_PX).fill(-1);landMask=new Uint8Array(MAP_PX);
  const pm=mkPerm(),noise=mkNoise(pm),img=bctx.createImageData(MAP_W,MAP_H),d=img.data;
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const nx=x/MAP_W-.5,ny=y/MAP_H-.5;
      let v=noise(nx*4,ny*4)*.6+noise(nx*8,ny*8)*.3+noise(nx*16,ny*16)*.1;v-=Math.abs(ny)*2.5*.35;
      const i=y*MAP_W+x,p=i*4;
      if(v>.04){landMask[i]=1;geoTotal[0]=(geoTotal[0]||0)+1;d[p]=44;d[p+1]=60;d[p+2]=44;}
      else{featByPixel[i]=-1;d[p]=10;d[p+1]=18;d[p+2]=44;}d[p+3]=255;
    }
    if(y%256===0){prog(10+Math.floor(y/MAP_H*86),"Generating procedural map…");await sleep(1);}
  }
  bctx.putImageData(img,0,0);
  const csel=$("csel");csel.innerHTML="";
  const o=document.createElement("option");o.value=0;o.textContent="Uncharted World";csel.appendChild(o);
  $("swatch").style.background="#3b82f6";
  prog(100,"Ready (offline mode)");await sleep(80);$("loading").style.display="none";resetView();
}
function mkPerm(){const p=Array.from({length:256},(_,i)=>i);for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}return[...p,...p];}
function mkNoise(pm){
  const fd=t=>t*t*t*(t*(t*6-15)+10),lp=(a,b,t)=>a+t*(b-a),gr=(h,x,y)=>{switch(h&3){case 0:return x+y;case 1:return -x+y;case 2:return x-y;default:return -x-y;}};
  return(x,y)=>{const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fd(x),v=fd(y),a=pm[X]+Y,b=pm[X+1]+Y;return lp(lp(gr(pm[a],x,y),gr(pm[b],x-1,y),u),lp(gr(pm[a+1],x,y-1),gr(pm[b+1],x-1,y-1),u),v);};
}

// ── Start — no external library loading needed! ───────────────────
(async()=>{
  prog(3,"Initialising…");
  try{
    await boot();
  }catch(e){
    console.error("boot() failed:",e);
    showErr("Map load failed: "+e.message+"\n\nFalling back to procedural map…");
    await sleep(2000);
    $("err-box").style.display="none";$("prog-bar").style.display="block";$("retry-btn").style.display="none";
    await proceduralFallback();
  }
})();
